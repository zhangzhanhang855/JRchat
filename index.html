<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 核心适配：viewport-fit=cover 让网页完全接管屏幕，配合 CSS 的 safe-area 使用 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#090a0f" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JR Chat">
  
  <title>JR Chat - Ultimate Flagship V2</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================================================
       1. 高级主题引擎 (Linear / Discord 结合体)
       ========================================================================== */
    :root {
      --bg-base: #090a0f;
      --bg-sidebar: rgba(14, 16, 21, 0.7);
      --bg-panel: #12141c;
      --bg-message: rgba(255, 255, 255, 0.03);
      --bg-message-self: rgba(99, 102, 241, 0.15);
      
      --accent-color: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --danger-color: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.1);
      --success-color: #34d399;
      
      --text-main: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      
      --border-light: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.1);
      
      --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      --blur-md: blur(16px);
      --blur-lg: blur(32px);
    }

    [data-theme="amoled"] {
      --bg-base: #000000;
      --bg-sidebar: rgba(0, 0, 0, 0.8);
      --bg-panel: #050505;
      --border-light: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-base); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; transition: background 0.3s ease; }
    
    a { color: var(--accent-hover); text-decoration: none; }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    /* ==========================================================================
       2. 登录穹顶 (包含极光渐变背景)
       ========================================================================== */
    #auth-screen { 
      position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; 
      background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), var(--bg-base);
      transition: opacity 0.5s ease, visibility 0.5s ease; 
    }
    .auth-card { background: rgba(20, 22, 30, 0.6); backdrop-filter: var(--blur-lg); border: 1px solid var(--border-strong); padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; box-shadow: var(--glass-shadow); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-color), transparent); }
    .auth-brand { font-size: 36px; margin-bottom: 20px; color: var(--accent-color); filter: drop-shadow(0 0 10px var(--accent-glow)); }
    .auth-card h2 { font-weight: 800; font-size: 24px; margin-bottom: 5px; color: #fff; }
    .auth-input-group { position: relative; margin-top: 20px; }
    .auth-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
    .auth-input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-light); color: var(--text-main); border-radius: 12px; outline: none; font-size: 15px; transition: all 0.3s ease; }
    .auth-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 2px var(--accent-glow); }
    .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent-color); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 20px; margin-bottom: 15px; transition: 0.2s; }
    .auth-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }
    .auth-switch { color: var(--text-muted); font-size: 13px; cursor: pointer; transition: 0.2s; }
    .auth-switch:hover { color: #fff; }

    /* ==========================================================================
       3. 核心应用架构 (三栏)
       ========================================================================== */
    #app-container { display: flex; width: 100%; height: 100%; }
    
    /* 左侧边栏 */
    #sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: var(--blur-md); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
    
    /* 🍏 【重要适配】：加上 env(safe-area-inset-top) 避开刘海 */
    .sidebar-header { padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); }
    .sidebar-brand { font-size: 18px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
    .theme-toggle { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: 0.2s; padding: 5px; }
    .theme-toggle:hover { color: var(--text-main); }
    
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .section-title { padding: 10px 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    
    .nav-item { padding: 10px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; }
    .nav-item i { font-size: 14px; width: 18px; text-align: center; opacity: 0.6; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.04); color: #fff; }
    .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--accent-hover); }
    .nav-item.active i { opacity: 1; color: var(--accent-color); }
    
    .status-dot { width: 6px; height: 6px; background-color: var(--success-color); border-radius: 50%; box-shadow: 0 0 5px var(--success-color); margin-left: auto; display: none; }
    .nav-item.is-online .status-dot { display: block; }
    
    /* 侧边栏底部与注销按钮 */
    .sidebar-footer { padding: calc(15px + env(safe-area-inset-bottom, 0px)) 15px 15px; border-top: 1px solid var(--border-light); background: rgba(0,0,0,0.2); }
    .profile-card { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .profile-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; }
    .profile-info { flex: 1; overflow: hidden; }
    .profile-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-status { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    
    /* 🚪 【新增】：注销按钮 */
    .logout-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 8px; border-radius: 8px; transition: 0.2s; }
    .logout-btn:hover { color: var(--danger-color); background: var(--danger-bg); }

    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .q-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); color: var(--text-main); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
    .q-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--border-strong); }
    .q-btn.full { grid-column: span 2; }
    .q-btn.admin { background: rgba(234, 179, 8, 0.1); color: #facc15; border-color: rgba(234, 179, 8, 0.2); display: none; }

    /* 主聊天区域 */
    #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.08), transparent 50%); min-width: 0; }
    
    /* 🍏 【重要适配】：加上 env(safe-area-inset-top) */
    .chat-header { padding: calc(16px + env(safe-area-inset-top, 0px)) 24px 16px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; background: rgba(9, 10, 15, 0.6); backdrop-filter: var(--blur-md); z-index: 10; }
    .header-info { display: flex; align-items: center; gap: 12px; }
    .mobile-menu-btn { display: none; background: transparent; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; padding: 5px; }
    .chat-title-group { display: flex; flex-direction: column; gap: 2px; }
    .chat-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; }
    .chat-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    
    .header-actions { display: flex; gap: 8px; }
    .tool-btn { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; }
    .tool-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .tool-btn.danger:hover { background: var(--danger-bg); color: var(--danger-color); }

    /* 消息流 */
    #messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .message-group { display: flex; gap: 12px; max-width: 85%; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
    .message-group.self { align-self: flex-end; flex-direction: row-reverse; }
    
    .msg-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .message-group.self .msg-body { align-items: flex-end; }
    
    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin: 0 2px; }
    .message-group.self .msg-meta { flex-direction: row-reverse; }
    .msg-sender { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .msg-time { font-size: 10px; color: var(--text-muted); }
    
    .msg-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.5; background: var(--bg-message); border: 1px solid var(--border-light); color: var(--text-main); border-radius: 2px 16px 16px 16px; word-break: break-word; }
    .message-group.self .msg-bubble { background: var(--bg-message-self); border-color: var(--accent-color); color: #fff; border-radius: 16px 2px 16px 16px; }
    
    .msg-bubble a { color: var(--accent-hover); text-decoration: underline; }
    .msg-image { max-width: 280px; max-height: 280px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border-light); object-fit: cover; transition: 0.2s; }
    .msg-image:hover { transform: scale(1.02); }

    /* 输入区域 */
    /* 🍏 【重要适配】：加上 env(safe-area-inset-bottom) 避开底部黑条 */
    .input-area { padding: 15px 20px calc(20px + env(safe-area-inset-bottom, 0px)); background: transparent; }
    .input-wrapper { display: flex; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px 10px; border-radius: 16px; border: 1px solid var(--border-strong); align-items: flex-end; backdrop-filter: var(--blur-md); transition: 0.3s; }
    .input-wrapper:focus-within { border-color: var(--accent-color); background: rgba(0,0,0,0.5); }
    
    .input-tools { display: flex; gap: 4px; padding-bottom: 2px; }
    .tool-icon { background: transparent; border: none; width: 32px; height: 32px; border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: 0.2s; }
    .tool-icon:hover { background: rgba(255,255,255,0.08); color: #fff; }
    
    #file-upload-input { display: none; }
    
    .textarea-box { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; resize: none; max-height: 100px; min-height: 20px; padding: 6px 4px; line-height: 1.5; font-family: inherit; }
    .textarea-box::placeholder { color: var(--text-muted); }
    
    .send-action { padding-bottom: 2px; }
    .btn-send { background: var(--accent-color); color: white; border: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

    #emoji-picker { position: absolute; bottom: calc(80px + env(safe-area-inset-bottom, 0px)); left: 20px; background: rgba(20,22,30,0.9); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); border-radius: 12px; padding: 12px; width: 280px; box-shadow: var(--glass-shadow); display: none; grid-template-columns: repeat(6, 1fr); gap: 6px; z-index: 50; max-height: 200px; overflow-y: auto; }
    .emoji-item { font-size: 20px; cursor: pointer; text-align: center; padding: 4px; border-radius: 6px; transition: 0.2s; }
    .emoji-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.2); }

    /* ==========================================================================
       4. 组件与移动端极速适配
       ========================================================================== */
    #context-menu { position: fixed; background: rgba(20, 22, 30, 0.9); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); border-radius: 10px; padding: 6px; box-shadow: var(--glass-shadow); z-index: 9000; display: none; flex-direction: column; min-width: 140px; animation: scaleIn 0.15s ease-out; }
    .ctx-item { padding: 8px 12px; color: var(--text-main); font-size: 13px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .ctx-item:hover { background: var(--accent-color); color: #fff; }
    .ctx-item.ctx-danger { color: var(--danger-color); }
    .ctx-item.ctx-danger:hover { background: var(--danger-color); color: #fff; }

    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
    #lightbox-img { max-width: 90%; max-height: 85vh; border-radius: 8px; transform: scale(0.95); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .lightbox-close { position: absolute; top: calc(20px + env(safe-area-inset-top, 0px)); right: 20px; background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; }

    /* UI 模态框与 Toast */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: var(--blur-md); z-index: 8000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.2s; }
    .modal-box { background: rgba(20,22,30,0.9); border: 1px solid var(--border-strong); width: 90%; max-width: 360px; border-radius: 20px; padding: 24px; box-shadow: var(--glass-shadow); transform: scale(0.95); transition: 0.2s; }
    .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-input-field { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-light); color: #fff; border-radius: 10px; outline: none; margin-bottom: 20px; font-size: 14px; }
    .modal-input-field:focus { border-color: var(--accent-color); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
    .m-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
    .m-btn.cancel { background: transparent; color: var(--text-muted); }
    .m-btn.confirm { background: var(--accent-color); color: #fff; }
    .m-btn.danger { background: var(--danger-bg); color: var(--danger-color); }

    #toast-wrap { position: fixed; top: calc(15px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast-item { background: rgba(20, 22, 30, 0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); padding: 12px 20px; border-radius: 20px; font-size: 13px; color: #fff; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: toastSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .toast-item.success i { color: var(--success-color); }
    .toast-item.error i { color: var(--danger-color); }

    /* Admin Dashboard */
    #admin-dash { position: fixed; inset: 0; background: var(--bg-base); z-index: 7000; display: none; flex-direction: column; }
    .ad-header { padding: calc(16px + env(safe-area-inset-top, 0px)) 24px 16px; background: rgba(234, 179, 8, 0.05); border-bottom: 1px solid rgba(234, 179, 8, 0.1); display: flex; justify-content: space-between; align-items: center; color: #facc15; }
    .ad-body { flex: 1; display: flex; overflow: hidden; }
    .ad-sidebar { width: 280px; border-right: 1px solid var(--border-light); padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }
    .ad-main { flex: 1; padding: 24px; overflow-y: auto; }
    .user-card { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 14px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .ad-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
    .ad-btn-warn { background: rgba(234, 179, 8, 0.15); color: #facc15; }
    .ad-btn-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .ad-viewer { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 16px; height: 400px; overflow-y: auto; border: 1px solid var(--border-light); font-size: 13px; font-family: monospace; color: #a1a1aa; }

    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* 移动端终极排版 */
    @media (max-width: 768px) {
      .mobile-menu-btn { display: block; }
      #sidebar { position: fixed; height: 100%; transform: translateX(-100%); box-shadow: 10px 0 40px rgba(0,0,0,0.8); z-index: 200; width: 280px; }
      #sidebar.active { transform: translateX(0); }
      .message-group { max-width: 90%; }
      .ad-body { flex-direction: column; }
      .ad-sidebar { width: 100%; height: 250px; border-right: none; border-bottom: 1px solid var(--border-light); }
      #emoji-picker { width: calc(100vw - 40px); }
    }
  </style>
</head>
<body>

  <!-- UI 浮层 -->
  <div id="toast-wrap"></div>
  <div id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-header" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <input type="text" class="modal-input-field" id="modal-input" autocomplete="off">
      <div class="modal-footer" id="modal-actions"></div>
    </div>
  </div>
  <div id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
    <img id="lightbox-img" src="" alt="Preview" onclick="event.stopPropagation()">
  </div>
  <div id="context-menu">
    <div class="ctx-item" onclick="ctxAction('copy')"><i class="fa-solid fa-copy"></i> 复制文本</div>
    <div class="ctx-item" onclick="ctxAction('reply')"><i class="fa-solid fa-reply"></i> 快捷引用</div>
    <div style="height:1px; background:var(--border-light); margin: 4px 0;"></div>
    <div class="ctx-item ctx-danger" onclick="ctxAction('delete')"><i class="fa-solid fa-eye-slash"></i> 本地屏蔽</div>
  </div>

  <!-- Admin -->
  <div id="admin-dash">
    <div class="ad-header">
      <h2 style="font-size:18px;"><i class="fa-solid fa-terminal"></i> Root Protocol</h2>
      <button class="ad-btn ad-btn-warn" onclick="document.getElementById('admin-dash').style.display='none'">Exit</button>
    </div>
    <div class="ad-body">
      <div class="ad-sidebar" id="ad-user-list"></div>
      <div class="ad-main">
        <h3 style="margin-bottom:12px; font-size:14px; color:var(--text-muted);">Ghost Search</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <input type="text" id="ad-search" class="modal-input-field" placeholder="Target ID" style="margin:0; max-width:200px; padding:8px 12px;">
          <button class="ad-btn ad-btn-warn" onclick="adminFetch()">Execute</button>
        </div>
        <div id="ad-viewer" class="ad-viewer">Awaiting parameters...</div>
      </div>
    </div>
  </div>

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand"><i class="fa-brands fa-space-awesome"></i></div>
      <h2>JR Chat</h2>
      <div style="color:var(--text-muted); font-size:12px; margin-bottom:24px;">Secure Gateway V2</div>
      <div class="auth-input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="auth-usr" class="auth-input" placeholder="User ID" autocomplete="off" spellcheck="false">
      </div>
      <div class="auth-input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="auth-pwd" class="auth-input" placeholder="Passcode">
      </div>
      <button class="auth-btn" id="btn-login" onclick="execLogin()">LINK START</button>
      <button class="auth-btn" id="btn-register" onclick="execRegister()" style="display:none; background:#0ea5e9;">REGISTER</button>
      <div class="auth-switch" onclick="switchAuthMode()" id="auth-mode-text">New agent? Register here</div>
    </div>
  </div>

  <!-- App -->
  <div id="app-container">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand"><i class="fa-brands fa-strikethrough" style="color:var(--accent-color);"></i> JR Chat</div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
      </div>
      
      <div class="sidebar-scroll" id="nav-list"></div>
      
      <div class="sidebar-footer">
        <div class="profile-card">
          <div class="profile-avatar" id="my-avatar">X</div>
          <div class="profile-info">
            <div class="profile-name" id="my-name">Agent</div>
            <div class="profile-status">Secured</div>
          </div>
          <!-- 🚪 【新增】：断开连接/注销 按钮 -->
          <button class="logout-btn" onclick="execLogout()" title="断开连接注销"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="quick-actions">
          <button class="q-btn" onclick="openModal('createGroup')"><i class="fa-solid fa-plus"></i> 建群</button>
          <button class="q-btn" onclick="openModal('joinGroup')"><i class="fa-solid fa-satellite"></i> 加群</button>
          <button class="q-btn full" onclick="openModal('addFriend')"><i class="fa-solid fa-user-astronaut"></i> 建立通讯羁绊</button>
          <button class="q-btn full admin" id="btn-admin" onclick="openAdmin()"><i class="fa-solid fa-skull-crossbones"></i> ROOT 控制台</button>
        </div>
      </div>
    </aside>

    <main id="main-chat">
      <header class="chat-header">
        <div class="header-info">
          <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
          <div class="chat-title-group">
            <div class="chat-title" id="room-title"><i class="fa-solid fa-hashtag" style="color:var(--text-muted)"></i> 大厅</div>
            <div class="chat-subtitle" id="room-subtitle">ID: General</div>
          </div>
        </div>
        <div class="header-actions" id="room-tools"></div>
      </header>
      
      <div id="messages-view" onclick="hideContextMenu()"></div>
      
      <input type="file" id="file-upload-input" accept="image/*" onchange="handleFileUpload(event)">
      <div id="emoji-picker"></div>
      
      <div class="input-area">
        <div class="input-wrapper" id="input-wrap">
          <div class="input-tools">
            <button class="tool-icon" onclick="toggleEmojiPicker()"><i class="fa-regular fa-face-smile"></i></button>
            <button class="tool-icon" onclick="document.getElementById('file-upload-input').click()"><i class="fa-solid fa-paperclip"></i></button>
          </div>
          <textarea class="textarea-box" id="msg-input" placeholder="Message..."></textarea>
          <div class="send-action">
            <button class="btn-send" onclick="submitMessage()"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let authSessionToken = '', currUser = '', currRoom = '', onlineSet = [], isLoginMode = true;
    let currentTheme = localStorage.getItem('jrchat_theme') || 'dark';
    applyTheme(currentTheme);
    let ctxTargetMessage = null, isEmojiVisible = false;
    const emojis = ["😀","😂","😊","🥰","😎","🤩","😏","😒","😔","😭","😡","🥳","🤫","🤔","🙄","🤢","🤠","😈","👻","👽","🤖","💩","👍","👎","👏","🤝","🙏","💪","🔥","✨","🎉","💯","❤️","💔","📷","💻","🚀"];

    /* UI 引擎 */
    function toast(msg, type='info') {
      const wrap = document.getElementById('toast-wrap'); const el = document.createElement('div');
      el.className = `toast-item ${type}`;
      const icon = type==='success'?'fa-check-circle':type==='error'?'fa-triangle-exclamation':'fa-circle-info';
      el.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`; wrap.appendChild(el);
      setTimeout(() => { el.style.opacity=0; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(),300); }, 3000);
    }

    const mOverlay = document.getElementById('modal-overlay');
    function customModal({ title, desc, ph, hasInput=true, type='text', cText='Confirm', cClass='confirm', onOK }) {
      document.getElementById('modal-title').innerHTML = title; document.getElementById('modal-desc').innerText = desc;
      const inp = document.getElementById('modal-input'); inp.style.display = hasInput?'block':'none'; inp.type=type; inp.placeholder=ph||''; inp.value='';
      const acts = document.getElementById('modal-actions'); acts.innerHTML='';
      const btnCancel = document.createElement('button'); btnCancel.className='m-btn cancel'; btnCancel.innerText='取消'; btnCancel.onclick=closeModal;
      const btnOK = document.createElement('button'); btnOK.className=`m-btn ${cClass}`; btnOK.innerText=cText;
      btnOK.onclick = () => { const v=inp.value.trim(); if(hasInput&&!v)return inp.focus(); onOK(v); closeModal(); };
      acts.append(btnCancel, btnOK);
      mOverlay.style.display='flex'; setTimeout(() => { mOverlay.style.opacity=1; document.getElementById('modal-box').style.transform='scale(1)'; if(hasInput)inp.focus(); }, 10);
    }
    function closeModal() { mOverlay.style.opacity=0; document.getElementById('modal-box').style.transform='scale(0.95)'; setTimeout(()=>mOverlay.style.display='none', 200); }

    function openLightbox(src) { const lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = src; lb.style.display='flex'; setTimeout(()=>{lb.style.opacity=1; document.getElementById('lightbox-img').style.transform='scale(1)';},10); }
    function closeLightbox() { const lb = document.getElementById('lightbox'); lb.style.opacity=0; document.getElementById('lightbox-img').style.transform='scale(0.95)'; setTimeout(()=>lb.style.display='none',300); }

    document.addEventListener('contextmenu', e => {
      const bubble = e.target.closest('.msg-bubble');
      if(bubble) {
        e.preventDefault(); ctxTargetMessage = bubble; const menu = document.getElementById('context-menu'); menu.style.display='flex';
        let x = e.pageX, y = e.pageY; if(x+140>window.innerWidth) x-=140; if(y+100>window.innerHeight) y-=100;
        menu.style.left=`${x}px`; menu.style.top=`${y}px`;
      } else hideContextMenu();
    });
    function hideContextMenu() { document.getElementById('context-menu').style.display='none'; }
    function ctxAction(act) {
      hideContextMenu(); if(!ctxTargetMessage) return; const text = ctxTargetMessage.innerText;
      if(act==='copy') { navigator.clipboard.writeText(text); toast('Copied.', 'success'); }
      if(act==='reply') { const input=document.getElementById('msg-input'); input.value=`> ${text.substring(0,15)}...\n\n`+input.value; input.focus(); }
      if(act==='delete') { ctxTargetMessage.closest('.message-group').style.display='none'; toast('Hidden locally.'); }
    }

    const p = document.getElementById('emoji-picker');
    emojis.forEach(e => { const el=document.createElement('div'); el.className='emoji-item'; el.innerText=e; el.onclick=()=>{document.getElementById('msg-input').value+=e;toggleEmojiPicker();document.getElementById('msg-input').focus();}; p.appendChild(el); });
    function toggleEmojiPicker() { isEmojiVisible=!isEmojiVisible; document.getElementById('emoji-picker').style.display=isEmojiVisible?'grid':'none'; }

    function applyTheme(th) { document.documentElement.setAttribute('data-theme', th); document.getElementById('theme-color-meta').setAttribute('content', th==='amoled'?'#000000':'#090a0f'); localStorage.setItem('jrchat_theme', th); }
    function toggleTheme() { currentTheme=currentTheme==='dark'?'amoled':'dark'; applyTheme(currentTheme); }

    function genColor(str) { let h=0; for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h); return `hsl(${h%360},70%,65%)`; }
    function parseText(raw) {
      let t = raw.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/^&gt; (.*?)(?:\n|$)/gm, '<div style="border-left:2px solid var(--accent-color); padding-left:8px; color:var(--text-muted); font-size:12px; margin-bottom:4px;">$1</div>');
      t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      return t.replace(/\n/g, '<br>');
    }

    /* 鉴权 */
    function switchAuthMode() { isLoginMode=!isLoginMode; document.getElementById('btn-login').style.display=isLoginMode?'block':'none'; document.getElementById('btn-register').style.display=isLoginMode?'none':'block'; document.getElementById('auth-mode-text').innerText=isLoginMode?'New agent? Register here':'Access existing protocol'; }
    function execLogin() { const u=document.getElementById('auth-usr').value.trim(), p=document.getElementById('auth-pwd').value.trim(); if(u&&p){authSessionToken=p;socket.emit('login',{username:u,password:p});} }
    function execRegister() { const u=document.getElementById('auth-usr').value.trim(), p=document.getElementById('auth-pwd').value.trim(); if(u&&p){authSessionToken=p;socket.emit('register',{username:u,password:p});} }
    
    // 🚪 注销登出逻辑
    function execLogout() {
      if(confirm('确认要断开加密连接并注销吗？')) {
        authSessionToken = '';
        socket.disconnect(); // 断开 socket
        window.location.reload(); // 刷新网页重置所有内存状态，返回遮罩层
      }
    }

    socket.on('auth error', m => toast(m, 'error'));
    socket.on('auth success', m => { toast(m, 'success'); switchAuthMode(); });
    socket.on('system message', m => toast(m, 'info'));

    socket.on('login success', data => {
      currUser = data.username;
      document.getElementById('auth-screen').style.opacity = 0; document.getElementById('auth-screen').style.visibility = 'hidden';
      document.getElementById('my-name').innerText = currUser; document.getElementById('my-avatar').innerText = currUser[0].toUpperCase(); document.getElementById('my-avatar').style.background = genColor(currUser);
      if(data.role === 'admin') document.getElementById('btn-admin').style.display = 'flex';
      if("Notification" in window && Notification.permission === "default") Notification.requestPermission();
      buildNavTree(data.groups, data.friends);
      if(!currRoom) routeTo('General', '大厅', 'group');
    });

    socket.on('update sidebar', () => { if(currUser&&authSessionToken) socket.emit('login', {username:currUser, password:authSessionToken}); });
    socket.on('online status update', users => { onlineSet=users; if(currUser&&authSessionToken) socket.emit('login', {username:currUser, password:authSessionToken}); });

    /* 路由 */
    function buildNavTree(groups, friends) {
      const box = document.getElementById('nav-list'); box.innerHTML = '<div class="section-title">Network Hubs</div>';
      groups.forEach(g => { box.innerHTML += `<div class="nav-item ${currRoom===g.groupId?'active':''}" data-id="${g.groupId}" onclick="routeTo('${g.groupId}', '${g.groupName}', 'group')"><i class="fa-solid fa-hashtag"></i> ${g.groupName}</div>`; });
      box.innerHTML += '<div class="section-title" style="margin-top:15px;">Secure Links</div>';
      friends.forEach(f => {
        const dmid = `DM_${[currUser, f].sort().join('_')}`; const isOn = onlineSet.includes(f);
        box.innerHTML += `<div class="nav-item ${isOn?'is-online':''} ${currRoom===dmid?'active':''}" data-id="${dmid}" onclick="routeTo('${dmid}', '${f}', 'friend')"><i class="fa-solid fa-user-astronaut"></i> ${f} <div class="status-dot"></div></div>`;
      });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    window.routeTo = function(id, name, type) {
      currRoom = id; document.getElementById('messages-view').innerHTML = '';
      document.getElementById('room-title').innerHTML = type==='friend'?`<i class="fa-solid fa-user-astronaut" style="color:var(--text-muted)"></i> ${name}`:`<i class="fa-solid fa-hashtag" style="color:var(--text-muted)"></i> ${name}`;
      document.getElementById('room-subtitle').innerText = `ID: ${id}`;
      
      const tools = document.getElementById('room-tools');
      tools.innerHTML = `<button class="tool-btn danger" onclick="execCommand('nuke', '${id}')"><i class="fa-solid fa-trash-can"></i></button>`;
      if(type==='group'&&id!=='General') tools.innerHTML += `<button class="tool-btn danger" onclick="execCommand('leave', '${id}')"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>`;
      else if(type==='friend') tools.innerHTML += `<button class="tool-btn danger" onclick="execCommand('deleteFriend', '${name}')"><i class="fa-solid fa-user-minus"></i></button>`;

      socket.emit('join room', id);
      document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); if(n.getAttribute('data-id')===id) n.classList.add('active'); });
      if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('active');
    };

    function openModal(cmd) {
      const map = {
        'createGroup':{t:'<i class="fa-solid fa-plus"></i> 新建阵地',d:'起个响亮的名字',p:'名称',fn:v=>socket.emit('create group',{username:currUser,groupName:v})},
        'joinGroup':{t:'<i class="fa-solid fa-satellite"></i> 接入通讯',d:'输入4位识别码',p:'e.g. 8848',fn:v=>socket.emit('join group by id',{username:currUser,groupId:v})},
        'addFriend':{t:'<i class="fa-solid fa-user-plus"></i> 建立羁绊',d:'精确代号建立私聊',p:'代号',fn:v=>socket.emit('add friend',{username:currUser,friendName:v})}
      };
      customModal({title:map[cmd].t, desc:map[cmd].d, ph:map[cmd].p, onOK:map[cmd].fn});
    }

    window.execCommand = function(cmd, payload) {
      if(cmd==='leave') customModal({title:'断开连接',desc:'确认退出？',hasInput:false,cClass:'danger',onOK:()=>socket.emit('leave group',{username:currUser,groupId:payload})});
      if(cmd==='deleteFriend') customModal({title:'解除羁绊',desc:`彻底切断与 ${payload} 的链接？授权: 2437520`,type:'password',cClass:'danger',onOK:v=>{if(v==='2437520')socket.emit('delete friend',{username:currUser,friendName:payload});else toast('Auth Denied','error');}});
      if(cmd==='nuke') customModal({title:'核弹协议',desc:'抹除此地一切数据。授权: 2437520',type:'password',cClass:'danger',cText:'FIRE',onOK:v=>{if(v==='2437520')socket.emit('clear history',payload);else toast('Aborted','error');}});
    };

    socket.on('history cleared', () => document.getElementById('messages-view').innerHTML = `<div style="text-align:center;color:var(--danger-color);margin-top:20px;font-size:12px;"><i class="fa-solid fa-biohazard"></i> PROTOCOL NUKE EXECUTED.</div>`);

    /* 通讯 */
    const msgInput = document.getElementById('msg-input');
    msgInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); submitMessage(); } });
    function submitMessage() { const v=msgInput.value.trim(); if(v&&currRoom){socket.emit('chat message',{room:currRoom,sender:currUser,text:v,msgType:'text'}); msgInput.value=''; isEmojiVisible=false; document.getElementById('emoji-picker').style.display='none';} }
    function handleFileUpload(e) { const f=e.target.files[0]; if(!f)return; if(f.size>2.5*1024*1024)return toast('Max 2.5MB','error'); const r=new FileReader(); r.onload=ev=>socket.emit('chat message',{room:currRoom,sender:currUser,text:ev.target.result,msgType:'image'}); r.readAsDataURL(f); e.target.value=''; }

    socket.on('load history', h => { document.getElementById('messages-view').innerHTML=''; h.forEach(renderMsg); });
    socket.on('chat message', m => {
      renderMsg(m);
      if(m.sender!==currUser && "Notification" in window && Notification.permission==="granted" && document.hidden) new Notification(`Intercept: ${m.sender}`, {body:m.msgType==='image'?'[Image]':m.text}).onclick=()=>window.focus();
    });

    function renderMsg(m) {
      const v = document.getElementById('messages-view'), isMe = m.sender === currUser;
      const t = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'Now';
      let h = m.msgType==='image' ? `<img src="${m.text}" class="msg-image" onclick="openLightbox('${m.text}')"/>` : `<div class="msg-bubble">${parseText(m.text)}</div>`;
      const w = document.createElement('div'); w.className = `message-group ${isMe?'self':''}`;
      w.innerHTML = `<div class="msg-avatar" style="background:${genColor(m.sender)};color:white;">${m.sender[0].toUpperCase()}</div>
        <div class="msg-body"><div class="msg-meta">${!isMe?`<span class="msg-sender">${m.sender}</span>`:''}<span class="msg-time">${t}</span></div>${h}</div>`;
      v.appendChild(w); v.scrollTop = v.scrollHeight;
    }

    /* 上帝控制台 */
    window.openAdmin = () => { document.getElementById('admin-dash').style.display='flex'; socket.emit('admin fetch data', currUser); };
    socket.on('admin data loaded', ({users}) => {
      const l = document.getElementById('ad-user-list'); l.innerHTML='<div style="color:gray;font-size:12px;margin-bottom:10px;">Entities</div>';
      users.forEach(u => {
        if(u.username==='admin')return;
        l.innerHTML += `<div class="user-card"><div><div style="color:#fff;font-weight:600;font-size:13px;">${u.username} ${u.isBanned?'<i class="fa-solid fa-ban" style="color:red"></i>':''}</div><div style="font-size:10px;color:gray;">N:${u.groups.length} L:${u.friends.length}</div></div>
          <div style="display:flex;flex-direction:column;gap:4px;"><button class="ad-btn ${u.isBanned?'ad-btn-warn':'ad-btn-danger'}" onclick="socket.emit('admin toggle ban',{adminUser:'${currUser}',targetUser:'${u.username}',banStatus:${!u.isBanned}});setTimeout(openAdmin,500);">${u.isBanned?'Lift':'Ban'}</button>
          <button class="ad-btn" style="background:rgba(96,165,250,0.1);color:#60a5fa;" onclick="const p=prompt('Override Pwd:');if(p)socket.emit('admin reset password',{adminUser:'${currUser}',targetUser:'${u.username}',newPassword:p})">Pwd</button></div></div>`;
      });
    });
    window.adminFetch = () => { const r=document.getElementById('ad-search').value.trim(); if(r)socket.emit('admin fetch room history',{adminUser:currUser,roomId:r}); };
    socket.on('admin room history loaded', msgs => {
      const b=document.getElementById('ad-viewer'); b.innerHTML='';
      if(!msgs.length)return b.innerHTML='Empty.';
      msgs.forEach(m=>{ const d=new Date(m.timestamp).toISOString().split('T'); b.innerHTML+=`<div style="margin-bottom:4px;border-bottom:1px dashed #333;padding-bottom:4px;"><span style="color:#34d399;">[${d[1].substring(0,8)}]</span> <span style="color:#6366f1;">${m.sender}</span> > <span style="color:gray;">${m.msgType==='text'?m.text:'[IMG]'}</span></div>`; });
      b.scrollTop = b.scrollHeight;
    });
  </script>
</body>
</html>
