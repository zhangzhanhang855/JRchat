<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JR Chat - Enterprise Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 全局变量保持不变 */
    :root { --bg-main: #0d0f14; --bg-sidebar: rgba(21, 24, 33, 0.85); --bg-panel: #1a1d27; --accent-color: #6366f1; --accent-hover: #4f46e5; --danger-color: #ef4444; --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255, 255, 255, 0.08); --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    
    /* 核心布局复用 */
    #auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 1000; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg-main) 60%); }
    .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; }
    .auth-card h2 { margin-bottom: 30px; font-weight: 800; font-size: 28px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-input { width: 100%; padding: 14px 18px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 12px; outline: none; transition: 0.3s; }
    .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent-color); color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
    .auth-switch { color: var(--text-muted); font-size: 13px; cursor: pointer; }
    
    #sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; }
    .brand { padding: 25px 20px 15px; font-size: 20px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    .channel-title { padding: 15px 20px 5px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
    #room-list { list-style: none; overflow-y: auto; flex: 1; padding: 0 10px; }
    .room-item { padding: 10px 15px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .room-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
    .room-item.active { background: var(--accent-color); color: #fff; }
    
    /* 【新增】：在线状态绿点 */
    .online-dot { width: 8px; height: 8px; background-color: #4ade80; border-radius: 50%; box-shadow: 0 0 5px #4ade80; margin-left: auto; display: none; }
    .room-item.is-online .online-dot { display: block; }
    
    .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
    .user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding: 0 5px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .user-info { flex: 1; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-status { font-size: 11px; color: #4ade80; display: flex; align-items: center; gap: 4px; }
    .user-status::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .action-btn:hover { background: rgba(255,255,255,0.1); }
    .action-btn.admin-mode { grid-column: span 2; background: rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.3); color: #facc15; display: none; }
    
    #main-chat { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top, rgba(99, 102, 241, 0.03), transparent 50%); }
    #chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(13, 15, 20, 0.8); backdrop-filter: blur(10px); }
    .menu-toggle { display: none; background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
    .icon-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .icon-btn.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
    
    #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .message-wrapper { display: flex; gap: 12px; max-width: 75%; }
    .message-wrapper.self { align-self: flex-end; flex-direction: row-reverse; }
    .avatar { width: 38px; height: 38px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .msg-content { display: flex; flex-direction: column; gap: 4px; }
    .message-wrapper.self .msg-content { align-items: flex-end; }
    .sender-name { font-size: 12px; color: var(--text-muted); margin: 0 2px; }
    .bubble { padding: 12px 16px; font-size: 14.5px; line-height: 1.5; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 2px 18px 18px 18px; }
    .message-wrapper.self .bubble { background: var(--accent-color); border-color: var(--accent-color); border-radius: 18px 2px 18px 18px; }
    .msg-image { max-width: 280px; border-radius: 14px; cursor: pointer; border: 1px solid var(--border-color); }

    #input-container { padding: 20px 25px; }
    #form { display: flex; gap: 12px; background: var(--bg-panel); padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border-color); align-items: center; }
    #input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
    .send-btn { background: var(--accent-color); color: white; border: none; width: 40px; height: 40px; border-radius: 14px; cursor: pointer; }
    .upload-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }

    /* ================= 【新增】：上帝模式控制台样式 ================= */
    #admin-dashboard { position: fixed; inset: 0; background: var(--bg-main); z-index: 4000; display: none; flex-direction: column; }
    .admin-header { padding: 20px; background: rgba(234, 179, 8, 0.1); border-bottom: 1px solid rgba(234, 179, 8, 0.3); display: flex; justify-content: space-between; align-items: center; color: #facc15; }
    .admin-content { flex: 1; display: flex; overflow: hidden; }
    .admin-sidebar { width: 250px; border-right: 1px solid var(--border-color); padding: 20px; overflow-y: auto; }
    .admin-main { flex: 1; padding: 20px; overflow-y: auto; }
    .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .admin-card-title { font-weight: 600; margin-bottom: 5px; }
    .admin-card-sub { font-size: 12px; color: var(--text-muted); }
    .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
    .btn-warn { background: rgba(234, 179, 8, 0.2); color: #facc15; }
    .btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

    /* 辅助UI */
    #custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 5000; display: none; justify-content: center; align-items: center; }
    .custom-modal { background: var(--bg-panel); border: 1px solid var(--border-color); width: 90%; max-width: 360px; border-radius: 20px; padding: 25px; }
    .modal-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 10px; margin-bottom: 20px; outline: none;}
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px;}
    .modal-btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; }
    .modal-btn.confirm { background: var(--accent-color); color: #fff; }
    .modal-btn.danger { background: var(--danger-color); color: #fff; }
    
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 6000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: rgba(26, 29, 39, 0.95); padding: 12px 20px; border-radius: 30px; font-size: 13px; color: #fff; }
    
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
      #sidebar.active { transform: translateX(0); }
      .message-wrapper { max-width: 90%; }
      .admin-content { flex-direction: column; }
      .admin-sidebar { width: 100%; height: 300px; border-right: none; border-bottom: 1px solid var(--border-color); }
    }
  </style>
</head>
<body>

  <div id="toast-container"></div>
  <div id="custom-modal-overlay">
    <div class="custom-modal" id="custom-modal">
      <div id="modal-title" style="font-weight:bold;margin-bottom:10px;"></div>
      <div id="modal-desc" style="font-size:12px;color:gray;margin-bottom:15px;"></div>
      <input type="text" class="modal-input" id="modal-input">
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <div id="admin-dashboard">
    <div class="admin-header">
      <h2><i class="fa-solid fa-crown"></i> JR Chat 全局控制中心</h2>
      <button class="btn-sm btn-warn" onclick="document.getElementById('admin-dashboard').style.display='none'">返回聊天</button>
    </div>
    <div class="admin-content">
      <div class="admin-sidebar" id="admin-user-list">
        </div>
      <div class="admin-main">
        <h3 style="margin-bottom:15px; color: var(--text-muted);"><i class="fa-solid fa-eye"></i> 监听模式：输入群号或私聊号查看记录</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <input type="text" id="admin-room-search" class="modal-input" placeholder="例如: 8848 或 DM_A_B" style="margin:0;">
          <button class="btn-sm btn-warn" onclick="adminFetchRoom()">调取记录</button>
        </div>
        <div id="admin-room-history" style="background:rgba(0,0,0,0.3); border-radius:12px; padding:15px; height:400px; overflow-y:auto; border:1px solid var(--border-color); font-size:13px;">
          </div>
      </div>
    </div>
  </div>

  <div id="auth-screen">
    <div class="auth-card">
      <h2>JR Chat</h2>
      <input type="text" id="auth-username" class="auth-input" placeholder="Username" autocomplete="off">
      <input type="password" id="auth-password" class="auth-input" placeholder="Password">
      <button class="auth-btn" id="btn-login" onclick="doLogin()">登录</button>
      <button class="auth-btn" id="btn-register" onclick="doRegister()" style="display:none; background:#0ea5e9;">注册</button>
      <div class="auth-switch" onclick="toggleAuthMode()" id="auth-switch-text">没有账号？点击注册</div>
    </div>
  </div>

  <aside id="sidebar">
    <div class="brand"><span><i class="fa-solid fa-infinity" style="color:var(--accent-color)"></i> JR Chat</span> <i class="fa-solid fa-xmark close-btn" onclick="toggleMenu()" style="display:none; cursor:pointer;"></i></div>
    <ul id="room-list"></ul>
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar" id="my-avatar" style="color:white;">U</div>
        <div class="user-info">
          <div class="user-name" id="my-name">User</div>
          <div class="user-status">Online</div>
        </div>
      </div>
      <div class="action-grid">
        <button class="action-btn" onclick="promptCreateGroup()"><i class="fa-solid fa-layer-group"></i> 建群</button>
        <button class="action-btn" onclick="promptJoinGroup()"><i class="fa-solid fa-magnifying-glass"></i> 加群</button>
        <button class="action-btn" onclick="promptAddFriend()"><i class="fa-solid fa-user-plus"></i> 加好友</button>
        <button class="action-btn admin-mode" id="admin-entry-btn" onclick="openAdminPanel()"><i class="fa-solid fa-crown"></i> 管理台</button>
      </div>
    </div>
  </aside>

  <main id="main-chat">
    <header id="chat-header">
      <div class="header-left">
        <button class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
        <h3 id="current-room-name">大厅</h3>
      </div>
      <div class="room-actions" id="room-actions"></div>
    </header>
    <div id="messages"></div>
    <div id="input-container">
      <form id="form">
        <input type="file" id="file-input" style="display:none" onchange="uploadImage(event)">
        <button type="button" class="upload-btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-image"></i></button>
        <input id="input" autocomplete="off" placeholder="发消息..." />
        <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
      </form>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentUser = '';
    let currentRoom = '';
    let isLoginMode = true;
    let onlineUserArray = []; // 本地缓存的在线用户名单

    // UI 工具
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity=0; setTimeout(()=>t.remove(),300); }, 3000);
    }

    const modal = document.getElementById('custom-modal-overlay');
    function showModal({ title, desc, placeholder, showInput=true, inputType='text', confirmText='确认', confirmClass='confirm', onConfirm }) {
      document.getElementById('modal-title').innerHTML = title; document.getElementById('modal-desc').innerText = desc;
      const inp = document.getElementById('modal-input');
      inp.style.display = showInput?'block':'none'; inp.type=inputType; inp.placeholder=placeholder||''; inp.value='';
      const actions = document.getElementById('modal-actions'); actions.innerHTML='';
      const cancel = document.createElement('button'); cancel.className='modal-btn'; cancel.style.background='transparent'; cancel.style.color='gray'; cancel.innerText='取消'; cancel.onclick=()=>modal.style.display='none';
      const submit = document.createElement('button'); submit.className=`modal-btn ${confirmClass}`; submit.innerText=confirmText; 
      submit.onclick=()=>{ onConfirm(inp.value.trim()); modal.style.display='none'; };
      actions.append(cancel, submit);
      modal.style.display='flex';
    }

    // 鉴权
    function toggleAuthMode() { isLoginMode=!isLoginMode; document.getElementById('btn-login').style.display=isLoginMode?'block':'none'; document.getElementById('btn-register').style.display=isLoginMode?'none':'block'; document.getElementById('auth-switch-text').innerText=isLoginMode?'注册账号':'直接登录'; }
    function doLogin() { socket.emit('login', {username: document.getElementById('auth-username').value, password: document.getElementById('auth-password').value}); }
    function doRegister() { socket.emit('register', {username: document.getElementById('auth-username').value, password: document.getElementById('auth-password').value}); }

    socket.on('auth error', msg => showToast(msg, 'error'));
    socket.on('auth success', msg => { showToast(msg, 'success'); toggleAuthMode(); });
    socket.on('system message', msg => showToast(msg, 'info'));

    socket.on('login success', data => {
      currentUser = data.username;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('my-name').innerText = currentUser;
      document.getElementById('my-avatar').innerText = currentUser.charAt(0).toUpperCase();
      document.getElementById('my-avatar').style.background = getAvatarColor(currentUser);
      
      // 如果是 admin，显示皇冠按钮
      if (data.role === 'admin') document.getElementById('admin-entry-btn').style.display = 'flex';

      if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
      renderSidebar(data.groups, data.friends);
      switchRoom('General', '大厅', 'group');
    });

    socket.on('update sidebar', () => socket.emit('login', {username: currentUser, password: document.getElementById('auth-password').value}));

    // 【新增】：监听全局在线状态
    socket.on('online status update', (activeUsers) => {
      onlineUserArray = activeUsers;
      // 触发侧边栏重新渲染以刷新绿点
      const p = document.getElementById('auth-password').value;
      if(currentUser && p) socket.emit('login', {username: currentUser, password: p});
    });

    function renderSidebar(groups, friends) {
      const list = document.getElementById('room-list');
      list.innerHTML = '<div class="channel-title">Channels</div>';
      groups.forEach(g => { list.innerHTML += `<li class="room-item ${currentRoom === g.groupId ? 'active' : ''}" onclick="switchRoom('${g.groupId}', '${g.groupName}', 'group')"><i class="fa-solid fa-hashtag"></i> ${g.groupName}</li>`; });
      list.innerHTML += '<div class="channel-title" style="margin-top:15px;">Direct Messages</div>';
      friends.forEach(f => {
        const dmId = `DM_${[currentUser, f].sort().join('_')}`;
        // 检查该好友是否在 onlineUserArray 中
        const isOnline = onlineUserArray.includes(f);
        list.innerHTML += `<li class="room-item ${isOnline ? 'is-online' : ''} ${currentRoom === dmId ? 'active' : ''}" onclick="switchRoom('${dmId}', '${f}', 'friend')"><i class="fa-solid fa-user"></i> ${f} <div class="online-dot"></div></li>`;
      });
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    window.switchRoom = function(roomId, displayName, type) {
      currentRoom = roomId;
      document.getElementById('current-room-name').innerHTML = type==='friend'?`<i class="fa-solid fa-user"></i> ${displayName}`:`<i class="fa-solid fa-hashtag"></i> ${displayName}`;
      const actions = document.getElementById('room-actions');
      actions.innerHTML = `<button class="icon-btn danger" onclick="promptClearHistory('${roomId}')"><i class="fa-solid fa-trash-can"></i></button>`;
      if(type==='group' && roomId!=='General') actions.innerHTML += `<button class="icon-btn danger" onclick="promptLeaveGroup('${roomId}')"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>`;
      else if(type==='friend') actions.innerHTML += `<button class="icon-btn danger" onclick="promptDeleteFriend('${displayName}')"><i class="fa-solid fa-user-minus"></i></button>`;
      
      socket.emit('join room', roomId);
      document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active')); event?.currentTarget?.classList.add('active');
      if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('active');
    };

    window.promptCreateGroup = () => showModal({title:'建群', desc:'起个名字', onConfirm: n=>socket.emit('create group', {username:currentUser, groupName:n})});
    window.promptJoinGroup = () => showModal({title:'加群', desc:'输入群号', onConfirm: id=>socket.emit('join group by id', {username:currentUser, groupId:id})});
    window.promptAddFriend = () => showModal({title:'加好友', desc:'精确用户名', onConfirm: n=>socket.emit('add friend', {username:currentUser, friendName:n})});
    window.promptLeaveGroup = (id) => showModal({title:'退群', desc:'确定退出？', showInput:false, confirmClass:'danger', onConfirm:()=>socket.emit('leave group', {username:currentUser, groupId:id})});
    
    // 安全操作保留密码锁
    window.promptDeleteFriend = (name) => showModal({title:'删好友', desc:'输入授权码继续(2437520)', inputType:'password', confirmClass:'danger', onConfirm:(v)=>{if(v==='2437520') socket.emit('delete friend', {username:currentUser, friendName:name}); else showToast('密码错误', 'error');}});
    window.promptClearHistory = (id) => showModal({title:'清空记录', desc:'核弹警告，输入授权码(2437520)', inputType:'password', confirmClass:'danger', onConfirm:(v)=>{if(v==='2437520') socket.emit('clear history', id); else showToast('密码错误', 'error');}});

    // ==========================================
    // 👑 上帝控制台前端逻辑
    // ==========================================
    window.openAdminPanel = () => {
      document.getElementById('admin-dashboard').style.display = 'flex';
      socket.emit('admin fetch data', currentUser);
    };

    socket.on('admin data loaded', ({ users, groups }) => {
      const list = document.getElementById('admin-user-list');
      list.innerHTML = `<h3 style="color:var(--text-muted);margin-bottom:15px;">居民名册 (${users.length})</h3>`;
      users.forEach(u => {
        if(u.username === 'admin') return;
        const btnText = u.isBanned ? '解封' : '封禁';
        const btnClass = u.isBanned ? 'btn-warn' : 'btn-danger';
        list.innerHTML += `
          <div class="admin-card">
            <div>
              <div class="admin-card-title">${u.username} ${u.isBanned ? '🚫' : ''}</div>
              <div class="admin-card-sub">好友: ${u.friends.length} | 群组: ${u.groups.length}</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
              <button class="btn-sm ${btnClass}" onclick="adminToggleBan('${u.username}', ${!u.isBanned})">${btnText}</button>
              <button class="btn-sm" style="background:#3b82f6;color:white;" onclick="adminResetPwd('${u.username}')">改密</button>
            </div>
          </div>
        `;
      });
    });

    window.adminToggleBan = (targetUser, banStatus) => { socket.emit('admin toggle ban', { adminUser: currentUser, targetUser, banStatus }); setTimeout(openAdminPanel, 500); };
    window.adminResetPwd = (targetUser) => {
      const newPwd = prompt(`强制修改 ${targetUser} 的密码为：`);
      if(newPwd) socket.emit('admin reset password', { adminUser: currentUser, targetUser, newPassword });
    };
    window.adminFetchRoom = () => {
      const roomId = document.getElementById('admin-room-search').value;
      if(roomId) socket.emit('admin fetch room history', { adminUser: currentUser, roomId });
    };

    socket.on('admin room history loaded', msgs => {
      const box = document.getElementById('admin-room-history');
      box.innerHTML = '';
      if(msgs.length === 0) return box.innerHTML = '<div style="color:gray;">该房间空空如也，或房间号不存在。</div>';
      msgs.forEach(m => {
        box.innerHTML += `<div style="margin-bottom:8px;"><span style="color:#facc15;">[${new Date(m.timestamp).toLocaleTimeString()}]</span> <span style="font-weight:bold;color:#60a5fa;">${m.sender}</span>: ${m.msgType==='text'?m.text:'[图片]'}</div>`;
      });
      box.scrollTop = box.scrollHeight;
    });

    // --- 聊天渲染逻辑 ---
    socket.on('history cleared', () => document.getElementById('messages').innerHTML = '<div style="text-align:center;color:red;font-size:12px;">记录已被彻底清空</div>');
    function getAvatarColor(name) { let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return `hsl(${h%360},65%,60%)`; }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault(); const v = document.getElementById('input').value;
      if(v && currentRoom) { socket.emit('chat message', { room: currentRoom, sender: currentUser, text: v, msgType: 'text' }); document.getElementById('input').value = ''; }
    });
    window.uploadImage = e => {
      const f = e.target.files[0]; if(!f) return;
      if(f.size>2*1024*1024) return showToast('图片不能超过2MB','error');
      const r = new FileReader(); r.onload = e => socket.emit('chat message', { room: currentRoom, sender: currentUser, text: e.target.result, msgType: 'image' });
      r.readAsDataURL(f); e.target.value='';
    };

    socket.on('load history', h => { document.getElementById('messages').innerHTML=''; h.forEach(appendMessage); });
    socket.on('chat message', msg => {
      appendMessage(msg);
      if (msg.sender !== currentUser && "Notification" in window && Notification.permission === "granted" && document.hidden) {
        const n = new Notification(`JR Chat: ${msg.sender}`, { body: msg.msgType==='image'?'[图片]':msg.text });
        n.onclick = () => window.focus();
      }
    });

    function appendMessage(msg) {
      const isSelf = msg.sender === currentUser;
      const c = msg.msgType==='image' ? `<img src="${msg.text}" class="msg-image" onclick="window.open('${msg.text}')" />` : `<div class="bubble">${msg.text}</div>`;
      document.getElementById('messages').innerHTML += `
        <div class="message-wrapper ${isSelf ? 'self' : ''}">
          <div class="avatar" style="background:${getAvatarColor(msg.sender)};color:white;">${msg.sender[0].toUpperCase()}</div>
          <div class="msg-content">${!isSelf ? `<span class="sender-name">${msg.sender}</span>` : ''}${c}</div>
        </div>`;
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  </script>
</body>
</html>
