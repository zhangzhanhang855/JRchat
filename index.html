<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#090a0f" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JR System">
  
  <title>JR Super App V11 - Premium Glass</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

  <style>
    /* ==========================================================================
       [1] 顶级色彩与质感引擎 (Apple Glassmorphism)
       ========================================================================== */
    :root {
      --bg-base: #090a0f; 
      --bg-glass: rgba(20, 24, 34, 0.4);
      --bg-glass-heavy: rgba(15, 17, 26, 0.7);
      --bg-input: rgba(0, 0, 0, 0.3);
      
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.5);
      
      --danger-color: #ff453a;
      --success-color: #34d399;
      --music-neon: #00f2ff;
      --call-neon: #34d399;
      
      --text-main: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
      
      --border-glass: rgba(255, 255, 255, 0.1);
      --border-highlight: rgba(255, 255, 255, 0.2);
      
      --shadow-glass: 0 24px 48px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      --shadow-input: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05);
      
      --blur-extreme: blur(40px);
      --curve-apple: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
    body { background: var(--bg-base); color: var(--text-main); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    a { color: var(--accent-secondary); text-decoration: none; }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; } 
    ::-webkit-scrollbar-track { background: transparent; } 
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; } 

    /* 全局动态弥散背景 */
    .bg-aurora { position: absolute; inset: 0; z-index: -1; overflow: hidden; background: var(--bg-base); }
    .bg-aurora::before, .bg-aurora::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 10s infinite alternate var(--curve-apple); }
    .bg-aurora::before { width: 300px; height: 300px; background: rgba(99, 102, 241, 0.4); top: -50px; left: -50px; }
    .bg-aurora::after { width: 400px; height: 400px; background: rgba(0, 242, 255, 0.2); bottom: -100px; right: -100px; animation-delay: -5s; }
    @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

    /* ==========================================================================
       [2] 核心质感组件 (Buttons, Inputs, Cards) 
       ========================================================================== */
    .glass-card {
      background: var(--bg-glass); backdrop-filter: var(--blur-extreme); -webkit-backdrop-filter: var(--blur-extreme);
      border: 1px solid var(--border-glass); border-radius: 28px; box-shadow: var(--shadow-glass);
    }

    /* 🔥 极度重构：顶级高级按钮质感 */
    .btn-premium {
      position: relative;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.8), rgba(129, 140, 248, 0.9));
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; font-weight: 700; font-size: 15px; letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.4); /* 顶部玻璃高光边缘 */
      border-radius: 16px; padding: 14px 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 8px 24px -6px rgba(99, 102, 241, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      overflow: hidden; transition: all 0.3s var(--curve-apple);
    }
    
    /* 动态扫光效果 */
    .btn-premium::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); transition: all 0.6s ease;
    }
    .btn-premium:hover::before { left: 200%; }
    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px -6px rgba(99, 102, 241, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.5), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    }
    .btn-premium:active {
      transform: scale(0.96) translateY(0);
      box-shadow: 0 4px 12px -4px rgba(99, 102, 241, 0.5), inset 0 2px 6px rgba(0, 0, 0, 0.4);
    }
    
    .btn-ghost {
      background: rgba(255, 255, 255, 0.05); color: var(--text-main); font-weight: 600; font-size: 14px;
      border: 1px solid var(--border-glass); border-top: 1px solid rgba(255,255,255,0.15); border-radius: 14px; 
      padding: 12px 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; 
      transition: all 0.3s var(--curve-apple); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--border-highlight); transform: translateY(-1px); }
    .btn-ghost:active { transform: scale(0.96); }

    .btn-danger { 
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.8), rgba(248, 113, 113, 0.9)); 
        border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 24px -6px rgba(239, 68, 68, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        transition: all 0.3s var(--curve-apple); overflow: hidden; position: relative;
    }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -6px rgba(239, 68, 68, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.5); }
    .btn-danger:active { transform: scale(0.96); }

    .input-premium {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border-glass); color: #fff;
      border-radius: 14px; padding: 16px 20px; font-size: 15px; box-shadow: var(--shadow-input);
      transition: all 0.3s var(--curve-apple);
    }
    .input-premium:focus {
      background: rgba(0, 0, 0, 0.5); border-color: var(--accent-secondary);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 0 4px rgba(99,102,241,0.2);
    }
    .input-premium::placeholder { color: var(--text-muted); }

    .icon-btn { width: 40px; height: 40px; border-radius: 12px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; transition: all 0.2s var(--curve-apple); }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.1); }
    .icon-btn:active { transform: scale(0.9); }

    /* ==========================================================================
       [3] UI 浮层系统 (Toast & Modal)
       ========================================================================== */
    #toast-wrap { position: fixed; top: calc(20px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast-item { background: rgba(15, 17, 26, 0.85); backdrop-filter: var(--blur-extreme); border: 1px solid var(--border-highlight); padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2); animation: toastSlide 0.4s var(--curve-apple); }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 8000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
    .modal-box { width: 90%; max-width: 360px; padding: 30px; transform: scale(0.95); transition: 0.3s var(--curve-apple); }
    
    /* ==========================================================================
       [4] 登录网关 (Auth Screen)
       ========================================================================== */
    #auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s, visibility 0.6s; }
    .auth-box { width: 90%; max-width: 400px; padding: 40px 35px; text-align: center; position: relative; overflow: hidden; }
    
    .auth-logo { font-size: 48px; margin-bottom: 10px; background: linear-gradient(135deg, #fff, var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px var(--accent-glow)); }
    .auth-title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 5px; letter-spacing: -0.5px; }
    .auth-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 30px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
    
    .input-group { position: relative; margin-bottom: 16px; }
    .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
    .input-group .input-premium { padding-left: 50px; }
    
    .auth-switch { display: inline-block; font-size: 13px; color: var(--text-secondary); font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    .auth-switch:hover { color: #fff; text-decoration: underline; }

    /* ==========================================================================
       [5] 超级应用主架构 (Super App Layout)
       ========================================================================== */
    #app-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
    .main-view { flex: 1; display: none; overflow: hidden; position: relative; flex-direction: column; animation: viewFadeIn 0.4s var(--curve-apple); }
    .main-view.active { display: flex; }
    @keyframes viewFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* 悬浮 Dock 导航栏 */
    #app-nav { 
      position: absolute; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 20px; right: 20px; 
      height: 65px; background: rgba(20, 24, 34, 0.75); backdrop-filter: var(--blur-extreme); -webkit-backdrop-filter: var(--blur-extreme);
      border: 1px solid var(--border-glass); border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); 
      display: flex; justify-content: space-around; align-items: center; z-index: 500; 
    }
    .nav-tab { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s var(--curve-apple); width: 60px; }
    .nav-tab i { font-size: 22px; transition: all 0.3s var(--curve-apple); }
    .nav-tab.active { color: var(--accent-secondary); }
    .nav-tab.active i { transform: translateY(-4px) scale(1.1); filter: drop-shadow(0 4px 8px var(--accent-glow)); color: #fff; }

    .top-header { padding: calc(20px + env(safe-area-inset-top, 0px)) 24px 15px; border-bottom: 1px solid var(--border-glass); display: flex; align-items: center; justify-content: space-between; background: rgba(15, 17, 26, 0.6); backdrop-filter: var(--blur-md); z-index: 10; flex-shrink: 0; }

    /* ==========================================================================
       [6] 视图 1：聊天网关
       ========================================================================== */
    #view-chat { flex-direction: row; }
    #sidebar { width: 300px; height: 100%; border-right: 1px solid var(--border-glass); background: var(--bg-glass-heavy); backdrop-filter: var(--blur-md); display: flex; flex-direction: column; z-index: 600; transition: transform 0.4s var(--curve-apple); flex-shrink: 0; }
    .sb-list { flex: 1; overflow-y: auto; padding: 15px; }
    .sb-item { padding: 14px 16px; margin-bottom: 8px; border-radius: 16px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; transition: all 0.2s var(--curve-apple); border: 1px solid transparent; }
    .sb-item i { width: 22px; text-align: center; opacity: 0.6; font-size: 18px; }
    .sb-item:hover { background: rgba(255, 255, 255, 0.05); }
    .sb-item.active { background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(99, 102, 241, 0.05)); border-color: rgba(99, 102, 241, 0.3); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }
    .sb-item.active i { opacity: 1; color: var(--accent-secondary); filter: drop-shadow(0 0 8px var(--accent-glow)); }
    
    #main-chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.08), transparent 60%); padding-bottom: 85px; }
    #messages-view { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .msg-group { display: flex; gap: 12px; max-width: 85%; animation: slideIn 0.3s var(--curve-apple); } .msg-group.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; cursor: pointer; background-size: cover; background-position: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .msg-avatar:hover { transform: scale(1.05); }
    .msg-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; } .msg-group.self .msg-body { align-items: flex-end; }
    .msg-bubble { padding: 12px 18px; font-size: 15px; line-height: 1.6; background: rgba(255,255,255,0.05); backdrop-filter: var(--blur-md); border: 1px solid var(--border-glass); border-radius: 4px 20px 20px 20px; word-break: break-word; color: var(--text-main); }
    .msg-group.self .msg-bubble { background: var(--bg-message-self); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 20px 4px 20px 20px; box-shadow: 0 8px 20px -6px var(--accent-glow); }

    .input-area { padding: 10px 20px; position: absolute; bottom: 90px; left: 0; right: 0; } 
    .input-wrapper { display: flex; gap: 10px; background: rgba(20, 24, 34, 0.85); backdrop-filter: var(--blur-extreme); padding: 8px 12px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); align-items: flex-end; box-shadow: var(--shadow-glass); transition: all 0.3s; }
    .input-wrapper:focus-within { border-color: var(--accent-primary); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.2); background: rgba(0,0,0,0.8); }
    .input-box { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; resize: none; max-height: 120px; height: 24px; padding: 4px; line-height: 1.5; }

    /* ==========================================================================
       [7] 视图 2 & 3 & 4
       ========================================================================== */
    .scroll-view { flex: 1; overflow-y: auto; padding: 24px 24px 100px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .card-xl { width: 100%; max-width: 600px; padding: 24px; }

    .m-lcd { background: #050a05; border: 2px solid #000; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 40px; box-shadow: inset 0 0 30px #000, 0 10px 20px rgba(0,0,0,0.5); }
    .m-lcd-time { font-family: 'Share Tech Mono', monospace; font-size: 36px; font-weight: bold; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    .m-vinyl-wrap { width: 260px; height: 260px; border-radius: 50%; background: #000; border: 10px solid #222; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 40px; }
    .m-cover-art { width: 35%; height: 35%; border-radius: 50%; border: 4px solid #111; background: #333; z-index: 10; background-size: cover; background-position: center; position: relative; box-shadow: 0 0 0 2px var(--music-neon); transition: 0.3s; }
    .m-vinyl-wrap.playing .m-cover-art { animation: m-spin 6s linear infinite; }
    @keyframes m-spin { to { transform: rotate(360deg); } }

    /* ==========================================================================
       [8] 响应式布局
       ========================================================================== */
    @media (min-width: 769px) {
      #app-wrapper { flex-direction: row; }
      #app-nav { position: relative; width: 80px; height: 100dvh; bottom: auto; left: auto; right: auto; border-radius: 0; border-right: 1px solid var(--border-glass); border-top: none; flex-direction: column; padding: 30px 0; justify-content: flex-start; gap: 40px; background: rgba(15, 17, 26, 0.6); box-shadow: none; }
      #sidebar { position: relative; transform: none; box-shadow: none; }
      .mobile-menu-btn { display: none; }
      #main-chat-area { padding-bottom: 0; }
      .input-area { bottom: 0; }
    }
    @media (max-width: 768px) {
      #sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
      #sidebar.active { transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="bg-aurora"></div>

  <div id="toast-wrap"></div>

  <div id="auth-screen">
    <div class="glass-card auth-box">
      <div class="auth-logo"><i class="fa-brands fa-space-awesome"></i></div>
      <div class="auth-title">JR System</div>
      <div class="auth-subtitle">Premium Ecosystem V11</div>
      
      <div id="auth-main-ui">
        <div class="input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="auth-usr" class="input-premium" placeholder="特工代号 (Username)">
        </div>
        <div class="input-group default-only reg-only forgot-only">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="auth-pwd" class="input-premium" placeholder="存取密钥 (Password)">
        </div>
        <div class="input-group reg-only forgot-only" style="display:none;">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="auth-email" class="input-premium" placeholder="安全邮箱 (Email)">
        </div>
        
        <button class="btn-premium default-only" style="width:100%; margin-top:20px;" onclick="window.execLogin()">建立连接 <i class="fa-solid fa-arrow-right"></i></button>
        <button class="btn-ghost default-only" style="width:100%; margin-top:12px;" onclick="toast('通行密钥功能已就绪，请在安全中心配置', 'info')"><i class="fa-solid fa-fingerprint"></i> 使用通行密钥</button>
        
        <button class="btn-premium reg-only" onclick="window.execRegister()" style="display:none; width:100%; margin-top:20px; background:linear-gradient(135deg, #0ea5e9, #38bdf8);">注册身份</button>

        <div style="display:flex; justify-content:space-between; margin-top:25px;">
          <span class="auth-switch" onclick="window.switchAuthMode('register')" id="switch-reg">注册新账号</span>
          <span class="auth-switch" style="display:none;" onclick="window.switchAuthMode('login')" id="switch-log">返回登录</span>
        </div>
      </div>
    </div>
  </div>

  <div id="app-wrapper">
    <nav id="app-nav">
      <div class="nav-tab active" onclick="window.switchMainView('chat', this)"><i class="fa-solid fa-message"></i><span>消息</span></div>
      <div class="nav-tab" onclick="window.switchMainView('moments', this)"><i class="fa-solid fa-earth-americas"></i><span>动态</span></div>
      <div class="nav-tab" onclick="window.switchMainView('music', this)"><i class="fa-solid fa-compact-disc"></i><span>音乐</span></div>
      <div class="nav-tab" onclick="window.switchMainView('security', this)"><i class="fa-solid fa-shield-halved"></i><span>安全</span></div>
    </nav>

    <div id="view-chat" class="main-view active">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="top-title"><i class="fa-brands fa-strikethrough" style="color:var(--accent-primary);"></i> JR Chat</div>
          <button class="icon-btn" onclick="toast('暂未开放创建群组', 'info')"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div class="sb-list" id="nav-list">
            <div class="sb-item active"><i class="fa-solid fa-globe"></i> 全局大厅</div>
        </div>
      </aside>
      <div id="main-chat-area">
        <header class="top-header">
          <div style="display:flex; align-items:center; gap:16px;">
            <button class="icon-btn mobile-menu-btn" onclick="document.getElementById('sidebar').classList.add('active'); event.stopPropagation();"><i class="fa-solid fa-bars-staggered"></i></button>
            <div><div class="top-title" id="room-title">大厅</div><div style="font-size:12px;color:var(--text-muted);font-weight:500;" id="room-subtitle">ID: General</div></div>
          </div>
        </header>
        <div id="messages-view"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <button class="icon-btn" onclick="toast('请使用上方加号发送图片', 'info')"><i class="fa-solid fa-face-smile"></i></button>
            <textarea id="msg-input" class="input-box" placeholder="输入消息 (Enter 发送)..."></textarea>
            <button class="btn-premium" style="padding:10px; border-radius:18px; width:44px; height:44px;" onclick="window.submitMessage()"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>

    <div id="view-moments" class="main-view">
      <header class="top-header"><div class="top-title"><i class="fa-solid fa-earth-americas" style="color:#0ea5e9;"></i> 特工动态</div></header>
      <div class="scroll-view">
        <div class="glass-card card-xl" style="text-align:center; padding:50px;">
          <i class="fa-solid fa-satellite-dish" style="font-size:40px; color:var(--text-muted); margin-bottom:15px;"></i>
          <h3 style="color:#fff; margin-bottom:10px;">动态网络已就绪</h3>
          <p style="color:gray; font-size:14px; margin-bottom:20px;">前端渲染层正在加载网络节点...</p>
          <button class="btn-premium" style="margin:0 auto;" onclick="toast('该模块前端交互正在初始化中...', 'info')">发布新动态</button>
        </div>
      </div>
    </div>

    <div id="view-music" class="main-view">
      <header class="top-header">
        <div class="top-title"><i class="fa-solid fa-music" style="color:var(--music-neon);"></i> JR Music Engine</div>
      </header>
      <div class="scroll-view" style="justify-content:center;">
         <div class="m-lcd"><div style="color:var(--music-neon); font-weight:bold; margin-bottom:5px; font-size:18px;" id="m-title">SYSTEM STANDBY</div><div class="m-lcd-time" id="m-time">00:00:00</div></div>
         <div class="m-vinyl-wrap" id="m-vinyl"><div class="m-vinyl-disk"></div><div class="m-cover-art" id="m-cover"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;" id="m-emoji">💿</span></div></div>
         <div style="display:flex; gap:30px; align-items:center;">
           <button class="btn-ghost" style="width:56px; height:56px; border-radius:50%;" onclick="toast('无上一首', 'error')"><i class="fa-solid fa-backward-step"></i></button>
           <button class="btn-premium" style="width:72px; height:72px; border-radius:50%; padding:0; background:linear-gradient(135deg, var(--music-neon), #0ea5e9); color:#000; font-size:24px;" onclick="window.togglePlay()" id="btn-play-music"><i class="fa-solid fa-play" id="icon-play-music"></i></button>
           <button class="btn-ghost" style="width:56px; height:56px; border-radius:50%;" onclick="toast('无下一首', 'error')"><i class="fa-solid fa-forward-step"></i></button>
         </div>
      </div>
      <audio id="m-audio" src="https://raw.githubusercontent.com/zhangzhanhang855/musiconly/main/demo.mp3" playsinline></audio>
    </div>

    <div id="view-security" class="main-view">
      <header class="top-header"><div class="top-title"><i class="fa-solid fa-shield-halved" style="color:var(--success-color);"></i> 账户与安全</div></header>
      <div class="scroll-view">
        <div class="glass-card card-xl" style="display:flex; align-items:center; gap:20px;">
          <div id="sec-avatar" style="width:64px; height:64px; border-radius:18px; background:var(--accent-primary); display:flex; justify-content:center; align-items:center; font-size:24px; font-weight:bold; color:#fff; box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);">U</div>
          <div style="flex:1;">
            <div style="font-size:22px; font-weight:800; color:#fff; margin-bottom:4px;" id="sec-name">Agent</div>
            <div style="font-size:14px; color:var(--text-muted);">系统最高权限所有者</div>
          </div>
        </div>
        <div class="glass-card card-xl" style="border-color:rgba(239, 68, 68, 0.3); background:rgba(239, 68, 68, 0.05);">
           <h3 style="color:var(--danger-color); margin-bottom:15px; display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-radiation"></i> 危险操作区</h3>
           <p style="font-size:14px; color:gray; line-height:1.6; margin-bottom:20px;">断开连接将彻底清空当前浏览器的所有凭证缓存，下次进入需重新验证。</p>
           <button class="btn-danger" style="width:100%; font-weight:700; font-size:15px; cursor:pointer;" onclick="window.execLogout()"><i class="fa-solid fa-power-off"></i> 彻底断开连接</button>
         </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <script>
    // 初始化 Socket 并处理连接异常
    let socket;
    try {
      socket = io();
    } catch (e) {
      console.warn("Socket.io 连接未就绪，将采用降级模式");
    }

    let currUser = '', currRoom = 'General';
    
    // UI 基础反馈系统
    window.toast = function(msg, type='info') { 
      const wrap = document.getElementById('toast-wrap'); 
      const el = document.createElement('div'); 
      el.className = `toast-item ${type}`; 
      const icon = type==='success'?'fa-check-circle':type==='error'?'fa-triangle-exclamation':'fa-circle-info'; 
      el.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`; 
      wrap.appendChild(el); 
      setTimeout(() => { el.style.opacity=0; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(),400); }, 3000); 
    };

    // 视图切换引擎
    window.switchMainView = function(viewId, el) { 
      document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active')); 
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); 
      document.getElementById(`view-${viewId}`).classList.add('active'); 
      el.classList.add('active'); 
    };

    // 认证系统模式切换
    window.switchAuthMode = function(mode) {
      document.querySelectorAll('.default-only, .reg-only').forEach(el => el.style.display = 'none');
      if(mode === 'login') {
        document.querySelectorAll('.default-only').forEach(el => el.style.display = '');
      } else {
        document.querySelectorAll('.reg-only').forEach(el => el.style.display = '');
      }
    };

    // 🌟 修复登录核心逻辑（防卡死自适应降级）
    window.execLogin = function() { 
      const u = document.getElementById('auth-usr').value.trim(); 
      const p = document.getElementById('auth-pwd').value.trim(); 
      if(u && p) { 
        window.toast('正在建立加密通道...', 'info');
        
        // 判定后端 Socket 是否真正连接成功
        if (typeof socket !== 'undefined' && socket.connected) {
          socket.emit('login', { username: u, password: p }); 
        } else {
          // 如果部署到 Render 后端没有配好，自动触发本地模拟登录，让你可以继续看UI
          setTimeout(() => {
            window.toast('未检测到后端连接，进入本地离线体验模式', 'success');
            loginSuccessHandler({ username: u });
          }, 800);
        }
      } else { 
        window.toast('请输入特工代号与密钥', 'error'); 
      } 
    };

    window.execRegister = function() {
      const u = document.getElementById('auth-usr').value.trim(); 
      const e = document.getElementById('auth-email').value.trim(); 
      const p = document.getElementById('auth-pwd').value.trim(); 
      if(u && e && p) { 
         if (typeof socket !== 'undefined' && socket.connected) {
             socket.emit('register', { username: u, email: e, password: p }); 
         } else {
             window.toast('离线模式无法注册，请返回登录页直接进入', 'error');
         }
      } else { 
        window.toast('请填写完整信息', 'error'); 
      }
    };

    window.execLogout = function() {
      if(confirm('警告：确认要清空凭证并注销系统吗？')) {
        if(typeof socket !== 'undefined') socket.disconnect(); 
        window.location.reload();
      }
    };

    // 统一抽离登录成功的 UI 渲染
    function loginSuccessHandler(data) {
      currUser = data.username;
      document.getElementById('auth-screen').style.opacity = 0; 
      setTimeout(() => document.getElementById('auth-screen').style.visibility = 'hidden', 600);
      
      document.getElementById('sec-name').innerText = currUser;
      document.getElementById('sec-avatar').innerText = currUser[0].toUpperCase();
      
      if(typeof socket !== 'undefined' && socket.connected) {
          window.routeTo('General', '大厅', 'group');
      }
    }

    // Socket.io 响应监听 (安全绑定)
    if(typeof socket !== 'undefined') {
        socket.on('auth error', msg => window.toast(msg, 'error'));
        socket.on('auth success', msg => { window.toast(msg, 'success'); window.switchAuthMode('login'); });
        socket.on('system message', msg => window.toast(msg, 'info'));
        
        socket.on('login success', data => {
          window.toast(`欢迎回来，特工 ${data.username}`, 'success');
          loginSuccessHandler(data);
        });

        socket.on('load history', h => { 
          const v = document.getElementById('messages-view'); v.innerHTML = ''; 
          h.forEach(m => window.renderMsg(m)); v.scrollTop = v.scrollHeight; 
        });
        
        socket.on('chat message', m => { 
          window.renderMsg(m); 
          const v = document.getElementById('messages-view'); v.scrollTop = v.scrollHeight; 
        });
    }

    // 简单的路由模拟
    window.routeTo = function(id, name, type) {
      currRoom = id; 
      document.getElementById('room-title').innerText = name;
      document.getElementById('room-subtitle').innerText = `ID: ${id}`;
      if(typeof socket !== 'undefined' && socket.connected) socket.emit('join room', id);
    };

    // 聊天发送功能
    window.submitMessage = function() {
      const input = document.getElementById('msg-input');
      const v = input.value.trim(); 
      if(v) { 
        if(typeof socket !== 'undefined' && socket.connected) {
           socket.emit('chat message', { room: currRoom, sender: currUser, text: v, msgType: 'text' }); 
        } else {
           // 离线模式下自行渲染上屏
           window.renderMsg({ sender: currUser, text: v, timestamp: new Date().getTime() });
           const view = document.getElementById('messages-view');
           view.scrollTop = view.scrollHeight;
        }
        input.value = ''; 
      } 
    };

    window.renderMsg = function(m) {
      const v = document.getElementById('messages-view');
      const isMe = m.sender === currUser;
      const t = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const w = document.createElement('div'); 
      w.className = `msg-group ${isMe ? 'self' : ''}`;
      
      const initial = m.sender.charAt(0).toUpperCase();
      
      w.innerHTML = `
        <div class="msg-avatar" style="background:${isMe?'var(--accent-primary)':'#333'};color:white;">${initial}</div>
        <div class="msg-body">
          <div style="font-size:11px;color:var(--text-muted);margin:0 4px;display:flex;gap:8px;${isMe?'flex-direction:row-reverse':''}">${!isMe?`<span>${m.sender}</span>`:''}<span>${t}</span></div>
          <div class="msg-bubble">${m.text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>')}</div>
        </div>
      `;
      v.appendChild(w);
    };

    // 音乐播放控制
    const mAudio = document.getElementById('m-audio');
    const playIcon = document.getElementById('icon-play-music');
    const vinylWrap = document.getElementById('m-vinyl');
    window.togglePlay = function() {
      if(mAudio.paused) { mAudio.play(); } else { mAudio.pause(); }
    };
    mAudio.onplay = () => { playIcon.className = 'fa-solid fa-pause'; vinylWrap.classList.add('playing'); document.getElementById('m-title').innerText = "DEMO AUDIO PLAYING"; };
    mAudio.onpause = () => { playIcon.className = 'fa-solid fa-play'; vinylWrap.classList.remove('playing'); document.getElementById('m-title').innerText = "SYSTEM PAUSED"; };
    mAudio.ontimeupdate = () => { let s = mAudio.currentTime; if(!isNaN(s)) document.getElementById('m-time').innerText = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`; };

  </script>
</body>
</html>
