<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 【双端终极适配】启用动态视口高度，避开 iOS 底部黑条和顶部刘海 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0f14" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JR Chat">
  
  <title>JR Chat - Ultimate V3</title>
  
  <!-- 字体与图标 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================================================
       1. 动态主题引擎与 CSS 变量
       ========================================================================== */
    :root {
      --bg-base: #0f111a;
      --bg-sidebar: rgba(21, 24, 33, 0.85);
      --bg-panel: #1a1d27;
      --bg-message: #222634;
      --bg-message-self: #6366f1;
      
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --danger-color: #ef4444;
      --danger-hover: #dc2626;
      --success-color: #10b981;
      
      --text-main: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      
      --border-light: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.15);
      
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      --bubble-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      
      --blur-md: blur(12px);
      --blur-lg: blur(24px);
    }

    [data-theme="amoled"] {
      --bg-base: #000000;
      --bg-sidebar: rgba(0, 0, 0, 0.9);
      --bg-panel: #0a0a0a;
      --bg-message: #121212;
      --border-light: rgba(255, 255, 255, 0.1);
    }

    /* 基础重置，使用 100dvh 解决 iOS 滚动溢出 Bug */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-base); color: var(--text-main); height: 100dvh; overflow: hidden; display: flex; transition: background 0.3s ease; }
    a { color: var(--accent-color); text-decoration: none; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* ==========================================================================
       2. 登录遮罩层 (带 GitHub 背景)
       ========================================================================== */
    #auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background-image: linear-gradient(rgba(15, 17, 26, 0.7), rgba(15, 17, 26, 0.9)), url('https://raw.githubusercontent.com/zhangzhanhang855/JRchat/main/bg.jpg'); background-size: cover; background-position: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
    .auth-card { background: rgba(30, 34, 45, 0.4); backdrop-filter: var(--blur-lg); -webkit-backdrop-filter: var(--blur-lg); border: 1px solid var(--border-strong); padding: 45px 35px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; box-shadow: var(--glass-shadow); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .auth-brand { font-size: 36px; margin-bottom: 20px; color: var(--accent-color); }
    .auth-card h2 { font-weight: 800; font-size: 28px; margin-bottom: 5px; background: linear-gradient(135deg, #ffffff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-input-group { position: relative; margin-top: 20px; }
    .auth-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
    .auth-input { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-light); color: var(--text-main); border-radius: 14px; outline: none; font-size: 15px; transition: all 0.3s ease; }
    .auth-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px var(--accent-glow); background: rgba(0,0,0,0.5); }
    .auth-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; background: var(--accent-color); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 20px; margin-bottom: 15px; transition: all 0.2s; box-shadow: 0 4px 15px var(--accent-glow); }
    .auth-btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
    .auth-switch { color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: 0.2s; font-weight: 500; }

    /* ==========================================================================
       3. 核心布局：侧边栏与导航
       ========================================================================== */
    #app-container { display: flex; width: 100%; height: 100dvh; }
    
    #sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: var(--blur-md); -webkit-backdrop-filter: var(--blur-md); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
    /* iOS 刘海屏适配 */
    .sidebar-header { padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); }
    .sidebar-brand { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
    .theme-toggle { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; transition: 0.2s; }
    
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .section-title { padding: 10px 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    
    .nav-item { padding: 10px 12px; margin: 2px 0; border-radius: 10px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; overflow: hidden; }
    .nav-item i { width: 20px; text-align: center; opacity: 0.7; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
    .nav-item.active { background: var(--accent-color); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
    .nav-item.active i { opacity: 1; }
    
    .status-dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; box-shadow: 0 0 8px var(--success-color); margin-left: auto; display: none; }
    .nav-item.is-online .status-dot { display: block; }
    
    /* 底部个人卡片与注销 */
    .sidebar-footer { padding: 15px 15px calc(15px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid var(--border-light); background: rgba(0,0,0,0.15); }
    .profile-card { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 8px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); }
    .profile-avatar { width: 38px; height: 38px; border-radius: 10px; background: var(--accent-color); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; }
    .profile-info { flex: 1; overflow: hidden; }
    .profile-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; text-overflow: ellipsis; }
    .profile-status { font-size: 11px; color: var(--success-color); display: flex; align-items: center; gap: 4px; }
    .profile-status::before { content: ''; width: 6px; height: 6px; background: var(--success-color); border-radius: 50%; }
    
    .logout-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 6px; transition: 0.2s; }
    .logout-btn:hover { color: var(--danger-color); }

    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .q-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border-light); color: var(--text-main); padding: 8px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
    .q-btn:hover { background: rgba(255,255,255,0.08); }
    .q-btn.full { grid-column: span 2; }
    .q-btn.admin { display: none; background: rgba(245, 158, 11, 0.1); color: #fcd34d; border-color: rgba(245, 158, 11, 0.2); }

    /* ==========================================================================
       4. 主聊天区域与消息流
       ========================================================================== */
    #main-chat { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top center, rgba(99, 102, 241, 0.05), transparent 60%); min-width: 0; }
    
    .chat-header { padding: calc(15px + env(safe-area-inset-top, 0px)) 24px 15px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; background: rgba(15, 17, 26, 0.8); backdrop-filter: var(--blur-md); z-index: 10; }
    .header-info { display: flex; align-items: center; gap: 15px; }
    .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; }
    .chat-title-group { display: flex; flex-direction: column; gap: 2px; }
    .chat-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px;}
    .chat-subtitle { font-size: 12px; color: var(--text-muted); }
    
    /* 右上角操作按键区（删除/退群） */
    .header-actions { display: flex; gap: 10px; }
    .tool-btn { width: 36px; height: 36px; border-radius: 10px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: 0.2s; }
    .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .tool-btn.danger:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger-color); border-color: rgba(239, 68, 68, 0.3); }

    #messages-view { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .message-group { display: flex; gap: 12px; max-width: 85%; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .message-group.self { align-self: flex-end; flex-direction: row-reverse; }
    
    .msg-avatar { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; }
    .msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .message-group.self .msg-body { align-items: flex-end; }
    
    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin: 0 2px; }
    .message-group.self .msg-meta { flex-direction: row-reverse; }
    .msg-sender { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .msg-time { font-size: 11px; color: var(--text-muted); }
    
    .msg-bubble { padding: 12px 16px; font-size: 15px; line-height: 1.5; background: var(--bg-message); border: 1px solid var(--border-light); color: var(--text-main); border-radius: 4px 18px 18px 18px; box-shadow: var(--bubble-shadow); word-break: break-word; }
    .message-group.self .msg-bubble { background: var(--bg-message-self); border-color: var(--bg-message-self); color: #fff; border-radius: 18px 4px 18px 18px; }
    .msg-bubble a { color: #60a5fa; text-decoration: underline; }
    .message-group.self .msg-bubble a { color: #e0e7ff; }

    .msg-image { max-width: 300px; max-height: 300px; border-radius: 14px; cursor: pointer; border: 1px solid var(--border-light); object-fit: cover; transition: 0.2s; }
    .msg-image:hover { transform: scale(1.02); }

    /* ==========================================================================
       5. 智能输入区与表情面板
       ========================================================================== */
    .input-area { padding: 15px 24px calc(20px + env(safe-area-inset-bottom, 0px)); background: transparent; position: relative; }
    .input-wrapper { display: flex; gap: 10px; background: var(--bg-panel); padding: 8px 12px; border-radius: 24px; border: 1px solid var(--border-strong); align-items: flex-end; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: border-color 0.3s; }
    .input-wrapper:focus-within { border-color: var(--accent-color); }
    
    .input-tools { display: flex; gap: 4px; padding-bottom: 2px; }
    .tool-icon { background: transparent; border: none; width: 36px; height: 36px; border-radius: 12px; color: var(--text-muted); cursor: pointer; font-size: 18px; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
    .tool-icon:hover { background: rgba(255,255,255,0.08); color: #fff; }
    
    #file-upload-input { display: none; }
    
    /* 自动长高的输入框 */
    .textarea-box { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; resize: none; max-height: 120px; height: 24px; padding: 2px 4px; line-height: 1.5; }
    .textarea-box::placeholder { color: var(--text-muted); }
    
    .send-action { padding-bottom: 2px; }
    .btn-send { background: var(--accent-color); color: white; border: none; width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 15px; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

    #emoji-picker { position: absolute; bottom: calc(85px + env(safe-area-inset-bottom, 0px)); left: 24px; background: var(--bg-panel); border: 1px solid var(--border-strong); border-radius: 16px; padding: 15px; width: 300px; box-shadow: var(--glass-shadow); display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 50; max-height: 250px; overflow-y: auto; }
    .emoji-item { font-size: 24px; cursor: pointer; text-align: center; padding: 6px; border-radius: 8px; transition: 0.2s; }
    .emoji-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.2); }

    /* ==========================================================================
       6. 组件系统 (Modal, Context Menu, Lightbox)
       ========================================================================== */
    #context-menu { position: fixed; background: rgba(30, 34, 45, 0.9); backdrop-filter: var(--blur-lg); border: 1px solid var(--border-strong); border-radius: 12px; padding: 6px; box-shadow: var(--glass-shadow); z-index: 9000; display: none; flex-direction: column; min-width: 140px; animation: scaleIn 0.15s ease-out; }
    .ctx-item { padding: 10px 14px; color: var(--text-main); font-size: 14px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
    .ctx-item:hover { background: var(--accent-color); color: #fff; }
    .ctx-item.ctx-danger { color: var(--danger-color); }
    .ctx-item.ctx-danger:hover { background: var(--danger-color); color: #fff; }

    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
    #lightbox-img { max-width: 90%; max-height: 85dvh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transform: scale(0.95); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .lightbox-close { position: absolute; top: calc(20px + env(safe-area-inset-top, 0px)); right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }

    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 8000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.2s; }
    .modal-box { background: var(--bg-panel); border: 1px solid var(--border-strong); width: 90%; max-width: 380px; border-radius: 24px; padding: 30px; box-shadow: var(--glass-shadow); transform: scale(0.95); transition: 0.2s; }
    .modal-header { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #fff; display: flex; align-items: center; gap: 10px; }
    .modal-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .modal-input-field { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-light); color: #fff; border-radius: 12px; outline: none; margin-bottom: 24px; font-size: 15px; }
    .modal-input-field:focus { border-color: var(--accent-color); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; }
    .m-btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
    .m-btn.cancel { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .m-btn.confirm { background: var(--accent-color); color: #fff; }
    .m-btn.danger { background: rgba(239, 68, 68, 0.15); color: var(--danger-color); }

    #toast-wrap { position: fixed; top: calc(20px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast-item { background: rgba(30, 34, 45, 0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; color: #fff; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .toast-item.success i { color: var(--success-color); }
    .toast-item.error i { color: var(--danger-color); }

    /* Admin 穹顶面板 */
    #admin-dash { position: fixed; inset: 0; background: var(--bg-base); z-index: 7000; display: none; flex-direction: column; }
    .ad-header { padding: calc(20px + env(safe-area-inset-top, 0px)) 30px 20px; background: rgba(234, 179, 8, 0.05); border-bottom: 1px solid rgba(234, 179, 8, 0.2); display: flex; justify-content: space-between; align-items: center; color: #facc15; }
    .ad-body { flex: 1; display: flex; overflow: hidden; }
    .ad-sidebar { width: 300px; border-right: 1px solid var(--border-light); padding: 24px; overflow-y: auto; background: rgba(0,0,0,0.2); }
    .ad-main { flex: 1; padding: 30px; overflow-y: auto; }
    .user-card { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 18px; border-radius: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .ad-btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
    .ad-btn-warn { background: rgba(234, 179, 8, 0.15); color: #facc15; }
    .ad-btn-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .ad-viewer { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 24px; height: 500px; overflow-y: auto; border: 1px solid var(--border-light); font-size: 14px; font-family: monospace; color: #a1a1aa; }

    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* 移动端神级适配 */
    @media (max-width: 768px) {
      .mobile-menu-btn { display: block; }
      #sidebar { position: fixed; height: 100dvh; transform: translateX(-100%); box-shadow: 10px 0 40px rgba(0,0,0,0.6); z-index: 200; width: 280px; }
      #sidebar.active { transform: translateX(0); }
      .message-group { max-width: 92%; }
      .chat-header { padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px; }
      #messages-view { padding: 16px; gap: 16px; }
      .input-area { padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)); }
      .ad-body { flex-direction: column; }
      .ad-sidebar { width: 100%; height: 350px; border-right: none; border-bottom: 1px solid var(--border-light); }
      #emoji-picker { width: calc(100vw - 32px); left: 16px; bottom: calc(75px + env(safe-area-inset-bottom, 0px)); }
    }
  </style>
</head>
<body>

  <!-- UI 全局组件 -->
  <div id="toast-wrap"></div>
  
  <div id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-header" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <input type="text" class="modal-input-field" id="modal-input" autocomplete="off">
      <div class="modal-footer" id="modal-actions"></div>
    </div>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
    <img id="lightbox-img" src="" alt="Preview" onclick="event.stopPropagation()">
  </div>

  <div id="context-menu">
    <div class="ctx-item" onclick="ctxAction('copy')"><i class="fa-solid fa-copy"></i> 复制内容</div>
    <div style="height:1px; background:var(--border-light); margin: 4px 0;"></div>
    <div class="ctx-item ctx-danger" onclick="ctxAction('delete')"><i class="fa-solid fa-eye-slash"></i> 视觉隐藏</div>
  </div>

  <!-- Admin 控制台 -->
  <div id="admin-dash">
    <div class="ad-header">
      <h2 style="font-weight:800; font-size:22px;"><i class="fa-solid fa-terminal"></i> JR Chat Root</h2>
      <button class="ad-btn ad-btn-warn" onclick="document.getElementById('admin-dash').style.display='none'">退出终端</button>
    </div>
    <div class="ad-body">
      <div class="ad-sidebar" id="ad-user-list"></div>
      <div class="ad-main">
        <h3 style="margin-bottom:16px; color: var(--text-muted);"><i class="fa-solid fa-satellite-dish"></i> 数据监听协议</h3>
        <div style="display:flex; gap:12px; margin-bottom:24px;">
          <input type="text" id="ad-search" class="modal-input-field" placeholder="群号 或 DM_A_B" style="margin:0; max-width:300px;">
          <button class="ad-btn ad-btn-warn" onclick="adminFetch()">检索</button>
        </div>
        <div id="ad-viewer" class="ad-viewer">等待系统指令...</div>
      </div>
    </div>
  </div>

  <!-- 登录校验 -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand"><i class="fa-brands fa-space-awesome"></i></div>
      <h2>JR Chat V3</h2>
      <div style="margin-bottom:24px; color:var(--text-muted); font-size:13px;">Secure Terminal</div>
      
      <div class="auth-input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="auth-usr" class="auth-input" placeholder="用户 ID" autocomplete="off" spellcheck="false">
      </div>
      <div class="auth-input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="auth-pwd" class="auth-input" placeholder="安全密钥">
      </div>
      
      <button class="auth-btn" id="btn-login" onclick="execLogin()">登录系统</button>
      <button class="auth-btn" id="btn-register" onclick="execRegister()" style="display:none; background:#0ea5e9;">注册特工</button>
      <div class="auth-switch" onclick="switchAuthMode()" id="auth-mode-text">首次使用？点击注册</div>
    </div>
  </div>

  <!-- 核心界面 -->
  <div id="app-container">
    
    <!-- 左栏导航 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand"><i class="fa-brands fa-strikethrough" style="color:var(--accent-color);"></i> JR Chat</div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
      </div>
      
      <div class="sidebar-scroll" id="nav-list"></div>
      
      <div class="sidebar-footer">
        <div class="profile-card">
          <div class="profile-avatar" id="my-avatar">X</div>
          <div class="profile-info">
            <div class="profile-name" id="my-name">Agent</div>
            <div class="profile-status">Secured</div>
          </div>
          <button class="logout-btn" onclick="execLogout()" title="断开注销"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="quick-actions">
          <button class="q-btn" onclick="openModal('createGroup')"><i class="fa-solid fa-plus"></i> 建群</button>
          <button class="q-btn" onclick="openModal('joinGroup')"><i class="fa-solid fa-satellite"></i> 加群</button>
          <button class="q-btn full" onclick="openModal('addFriend')"><i class="fa-solid fa-user-plus"></i> 添加好友</button>
          <button class="q-btn full admin" id="btn-admin" onclick="openAdmin()"><i class="fa-solid fa-crown"></i> 上帝面板</button>
        </div>
      </div>
    </aside>

    <!-- 主通讯区 -->
    <main id="main-chat">
      <header class="chat-header">
        <div class="header-info">
          <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
          <div class="chat-title-group">
            <div class="chat-title" id="room-title"><i class="fa-solid fa-hashtag" style="color:var(--text-muted)"></i> 大厅</div>
            <div class="chat-subtitle" id="room-subtitle">ID: General</div>
          </div>
        </div>
        <!-- 🚮 【核心修复】：这就是你要的右侧毁灭按钮控制区 -->
        <div class="header-actions" id="room-tools"></div>
      </header>
      
      <div id="messages-view"></div>
      
      <!-- 📸 【核心修复】：隐藏文件域，修正了 ID -->
      <input type="file" id="file-upload-input" accept="image/*">
      <div id="emoji-picker"></div>
      
      <div class="input-area">
        <div class="input-wrapper" id="input-wrap">
          <div class="input-tools">
            <button class="tool-icon" id="btn-emoji"><i class="fa-regular fa-face-smile"></i></button>
            <button class="tool-icon" id="btn-upload"><i class="fa-solid fa-image"></i></button>
          </div>
          <!-- 📝 【核心修复】：支持自动伸缩的文本框 -->
          <textarea class="textarea-box" id="msg-input" rows="1" placeholder="Type a message..."></textarea>
          <div class="send-action">
            <button class="btn-send" id="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  
  <script>
    const socket = io();
    let authSessionToken = '', currUser = '', currRoom = '', onlineSet = [], isLoginMode = true;
    let currentTheme = localStorage.getItem('jrchat_theme') || 'dark';
    applyTheme(currentTheme);
    let ctxTargetMessage = null, isEmojiVisible = false;

    const emojis = ["😀","😂","🤣","😊","🥰","😎","🤩","😏","😒","😔","😭","😡","🤯","🥳","🤫","🤔","🙄","🤢","🤠","😈","👻","👽","🤖","💩","👍","👎","👏","🤝","🙏","💪","🔥","✨","🎉","💯","❤️","💔","📷","💻","🚀"];

    /* ==========================================================================
       1. UI 全局基础 (Toast, Modal, Lightbox, Esc 拦截)
       ========================================================================== */
    function toast(msg, type = 'info') {
      const wrap = document.getElementById('toast-wrap'); const el = document.createElement('div');
      el.className = `toast-item ${type}`;
      const icon = type==='success'?'fa-check-circle':type==='error'?'fa-triangle-exclamation':'fa-circle-info';
      el.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`; wrap.appendChild(el);
      setTimeout(() => { el.style.opacity=0; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(), 400); }, 3000);
    }

    const mOverlay = document.getElementById('modal-overlay');
    function customModal({ title, desc, ph, hasInput=true, type='text', cText='Confirm', cClass='confirm', onOK }) {
      document.getElementById('modal-title').innerHTML = title; document.getElementById('modal-desc').innerText = desc;
      const inp = document.getElementById('modal-input');
      inp.style.display = hasInput?'block':'none'; inp.type=type; inp.placeholder=ph||''; inp.value='';
      const acts = document.getElementById('modal-actions'); acts.innerHTML='';
      
      const btnCancel = document.createElement('button'); btnCancel.className='m-btn cancel'; btnCancel.innerText='取消'; btnCancel.onclick=()=>closeModal();
      const btnOK = document.createElement('button'); btnOK.className=`m-btn ${cClass}`; btnOK.innerText=cText;
      btnOK.onclick = () => { const v=inp.value.trim(); if(hasInput&&!v)return inp.focus(); onOK(v); closeModal(); };
      
      acts.append(btnCancel, btnOK);
      mOverlay.style.display='flex'; setTimeout(() => { mOverlay.style.opacity=1; document.getElementById('modal-box').style.transform='scale(1)'; if(hasInput)inp.focus(); }, 10);
    }
    function closeModal() { mOverlay.style.opacity=0; document.getElementById('modal-box').style.transform='scale(0.95)'; setTimeout(() => mOverlay.style.display='none', 200); }

    function openLightbox(src) { const lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = src; lb.style.display = 'flex'; setTimeout(() => { lb.style.opacity = 1; document.getElementById('lightbox-img').style.transform='scale(1)'; }, 10); }
    function closeLightbox() { const lb = document.getElementById('lightbox'); lb.style.opacity = 0; document.getElementById('lightbox-img').style.transform='scale(0.95)'; setTimeout(() => lb.style.display = 'none', 300); }

    // 👆 【全局点击闭合修复】：点击空白处关闭右键菜单和表情面板
    document.addEventListener('click', e => {
      // 处理右键菜单
      if (!e.target.closest('#context-menu') && !e.target.closest('.msg-bubble')) {
        document.getElementById('context-menu').style.display='none';
      }
      // 处理表情面板
      if (!e.target.closest('#emoji-picker') && !e.target.closest('#btn-emoji')) {
        isEmojiVisible = false;
        document.getElementById('emoji-picker').style.display='none';
      }
    });

    // 右键菜单呼出
    document.addEventListener('contextmenu', e => {
      const bubble = e.target.closest('.msg-bubble');
      if(bubble) {
        e.preventDefault(); ctxTargetMessage = bubble; const menu = document.getElementById('context-menu'); menu.style.display = 'flex';
        let x = e.pageX, y = e.pageY; if (x + 160 > window.innerWidth) x -= 160; if (y + 120 > window.innerHeight) y -= 120;
        menu.style.left = `${x}px`; menu.style.top = `${y}px`;
      }
    });
    
    function ctxAction(act) {
      document.getElementById('context-menu').style.display='none'; if(!ctxTargetMessage) return;
      if(act === 'copy') { navigator.clipboard.writeText(ctxTargetMessage.innerText); toast('内容已复制', 'success'); }
      if(act === 'delete') { ctxTargetMessage.closest('.message-group').style.display = 'none'; toast('消息已本地隐藏'); }
    }

    // Emoji 初始化
    const ep = document.getElementById('emoji-picker');
    emojis.forEach(e => {
      const el = document.createElement('div'); el.className='emoji-item'; el.innerText=e;
      el.onclick = () => { document.getElementById('msg-input').value += e; adjustTextareaHeight(); document.getElementById('msg-input').focus(); };
      ep.appendChild(el);
    });
    document.getElementById('btn-emoji').onclick = (e) => {
      isEmojiVisible=!isEmojiVisible; ep.style.display=isEmojiVisible?'grid':'none'; e.stopPropagation();
    };

    function applyTheme(th) { document.documentElement.setAttribute('data-theme', th); document.getElementById('theme-color-meta').setAttribute('content', th==='amoled'?'#000000':'#0d0f14'); localStorage.setItem('jrchat_theme', th); }
    function toggleTheme() { currentTheme = currentTheme === 'dark' ? 'amoled' : 'dark'; applyTheme(currentTheme); toast(`切换至 ${currentTheme} 模式`, 'success'); }

    // XSS 与文本过滤
    function genColor(str) { let h=0; for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h); return `hsl(${h%360},65%,60%)`; }
    function sanitize(raw) { return raw.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/'/g, "&#39;").replace(/"/g, "&quot;"); }
    function parseText(raw) {
      let t = sanitize(raw);
      t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      return t.replace(/\n/g, '<br>');
    }

    /* ==========================================================================
       2. 鉴权与生命周期
       ========================================================================== */
    function switchAuthMode() { isLoginMode=!isLoginMode; document.getElementById('btn-login').style.display=isLoginMode?'block':'none'; document.getElementById('btn-register').style.display=isLoginMode?'none':'block'; document.getElementById('auth-mode-text').innerText=isLoginMode?'首次使用？点击注册':'已有账户直接登录'; }
    
    function execLogin() { const u=document.getElementById('auth-usr').value.trim(); const p=document.getElementById('auth-pwd').value.trim(); if(u&&p){authSessionToken=p;socket.emit('login',{username:u,password:p});} }
    function execRegister() { const u=document.getElementById('auth-usr').value.trim(); const p=document.getElementById('auth-pwd').value.trim(); if(u&&p){authSessionToken=p;socket.emit('register',{username:u,password:p});} }
    
    function execLogout() {
      customModal({title:'<i class="fa-solid fa-power-off" style="color:var(--danger-color)"></i> 注销系统', desc:'确认要断开加密连接并清空内存授权吗？', hasInput:false, cClass:'danger', cText:'断开', onOK:()=>{ authSessionToken=''; socket.disconnect(); window.location.reload(); }});
    }

    socket.on('auth error', m => toast(m, 'error'));
    socket.on('auth success', m => { toast(m, 'success'); switchAuthMode(); });
    socket.on('system message', m => toast(m, 'info'));

    socket.on('login success', data => {
      currUser = data.username;
      document.getElementById('auth-screen').style.opacity = 0; document.getElementById('auth-screen').style.visibility = 'hidden';
      document.getElementById('my-name').innerText = sanitize(currUser);
      document.getElementById('my-avatar').innerText = sanitize(currUser)[0].toUpperCase();
      document.getElementById('my-avatar').style.background = genColor(currUser);
      if(data.role === 'admin') document.getElementById('btn-admin').style.display = 'flex';
      if("Notification" in window && Notification.permission === "default") Notification.requestPermission();
      
      buildNavTree(data.groups, data.friends);
      if(!currRoom) routeTo('General', '大厅', 'group');
    });

    socket.on('update sidebar', () => { if(currUser&&authSessionToken) socket.emit('login', {username:currUser, password:authSessionToken}); });
    socket.on('online status update', users => { onlineSet=users; if(currUser&&authSessionToken) socket.emit('login', {username:currUser, password:authSessionToken}); });

    /* ==========================================================================
       3. 核心路由与侧边栏
       ========================================================================== */
    // 🛡️ 【XSS 修复】：使用 dataset 传递参数，不用 inline onclick 拼接字符串，彻底避免单引号闪退！
    function buildNavTree(groups, friends) {
      const box = document.getElementById('nav-list'); box.innerHTML = '<div class="section-title">Network Hubs</div>';
      groups.forEach(g => {
        const div = document.createElement('div');
        div.className = `nav-item ${currRoom === g.groupId ? 'active' : ''}`;
        div.dataset.id = g.groupId; div.dataset.name = g.groupName; div.dataset.type = 'group';
        div.innerHTML = `<i class="fa-solid fa-hashtag"></i> ${sanitize(g.groupName)}`;
        div.onclick = function() { routeTo(this.dataset.id, this.dataset.name, this.dataset.type); };
        box.appendChild(div);
      });
      
      box.innerHTML += '<div class="section-title" style="margin-top:15px;">Secure Links</div>';
      friends.forEach(f => {
        const dmid = `DM_${[currUser, f].sort().join('_')}`;
        const div = document.createElement('div');
        div.className = `nav-item ${onlineSet.includes(f)?'is-online':''} ${currRoom === dmid ? 'active' : ''}`;
        div.dataset.id = dmid; div.dataset.name = f; div.dataset.type = 'friend';
        div.innerHTML = `<i class="fa-solid fa-user-astronaut"></i> ${sanitize(f)} <div class="status-dot"></div>`;
        div.onclick = function() { routeTo(this.dataset.id, this.dataset.name, this.dataset.type); };
        box.appendChild(div);
      });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // 路由核心引擎
    window.routeTo = function(id, name, type) {
      currRoom = id;
      document.getElementById('messages-view').innerHTML = ''; // 清空视口
      
      // 更新标题区
      document.getElementById('room-title').innerHTML = type==='friend' ? `<i class="fa-solid fa-user-astronaut" style="color:var(--text-muted)"></i> ${sanitize(name)}` : `<i class="fa-solid fa-hashtag" style="color:var(--text-muted)"></i> ${sanitize(name)}`;
      document.getElementById('room-subtitle').innerText = `ID: ${id}`;
      
      // 🛠️ 【修复】挂载右上角的动作按钮 (垃圾桶等)
      const tools = document.getElementById('room-tools');
      tools.innerHTML = '';
      
      // 添加：清空记录按钮 (垃圾桶)
      const btnClear = document.createElement('button');
      btnClear.className = 'tool-btn danger'; btnClear.title = '清空该房间所有聊天记录';
      btnClear.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
      btnClear.onclick = () => execCommand('nuke', id);
      tools.appendChild(btnClear);

      // 添加：退群 或 删好友 按钮
      if(type==='group' && id!=='General') {
        const btnLeave = document.createElement('button');
        btnLeave.className = 'tool-btn danger'; btnLeave.title = '断开该群组连接';
        btnLeave.innerHTML = '<i class="fa-solid fa-arrow-right-from-bracket"></i>';
        btnLeave.onclick = () => execCommand('leave', id);
        tools.appendChild(btnLeave);
      } else if(type==='friend') {
        const btnDel = document.createElement('button');
        btnDel.className = 'tool-btn danger'; btnDel.title = '消除该好友羁绊';
        btnDel.innerHTML = '<i class="fa-solid fa-user-minus"></i>';
        btnDel.onclick = () => execCommand('deleteFriend', name);
        tools.appendChild(btnDel);
      }

      socket.emit('join room', id);
      
      // 更新左侧列表高亮
      document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); if(n.dataset.id === id) n.classList.add('active'); });
      if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('active');
    };

    function openModal(cmd) {
      const map = {
        'createGroup': { t:'<i class="fa-solid fa-plus"></i> 新建节点', d:'给群聊命名。', p:'群名称', fn: v=>socket.emit('create group',{username:currUser,groupName:v}) },
        'joinGroup': { t:'<i class="fa-solid fa-satellite"></i> 接入通讯', d:'输入指挥官的4位识别码。', p:'例如: 8848', fn: v=>socket.emit('join group by id',{username:currUser,groupId:v}) },
        'addFriend': { t:'<i class="fa-solid fa-user-plus"></i> 建立羁绊', d:'输入特工精确代号建立私聊。', p:'特工用户名', fn: v=>socket.emit('add friend',{username:currUser,friendName:v}) }
      };
      customModal({title:map[cmd].t, desc:map[cmd].d, ph:map[cmd].p, onOK:map[cmd].fn});
    }

    window.execCommand = function(cmd, payload) {
      if(cmd==='leave') customModal({title:'<i class="fa-solid fa-arrow-right-from-bracket" style="color:var(--danger-color)"></i> 退群警告', desc:'确认销毁当前节点访问权限？', hasInput:false, cClass:'danger', cText:'断开', onOK:()=>socket.emit('leave group',{username:currUser,groupId:payload})});
      if(cmd==='deleteFriend') customModal({title:'<i class="fa-solid fa-user-slash" style="color:var(--danger-color)"></i> 解除羁绊', desc:`彻底切断与 ${sanitize(payload)} 的连接？输入: 2437520`, type:'password', ph:'Auth Code', cClass:'danger', cText:'执行', onOK:v=>{if(v==='2437520')socket.emit('delete friend',{username:currUser,friendName:payload});else toast('Authorization Denied.','error');}});
      if(cmd==='nuke') customModal({title:'<i class="fa-solid fa-radiation" style="color:var(--danger-color)"></i> 毁灭协议', desc:'永久抹除此房间内所有人的数据。输入: 2437520', type:'password', ph:'Nuke Code', cClass:'danger', cText:'FIRE', onOK:v=>{if(v==='2437520')socket.emit('clear history',payload);else toast('Nuke aborted.','error');}});
    };

    socket.on('history cleared', () => {
      document.getElementById('messages-view').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--danger-color);opacity:0.8;">
          <i class="fa-solid fa-biohazard" style="font-size:48px;margin-bottom:15px;"></i>
          <div style="font-size:14px;letter-spacing:2px;font-weight:700;">PROTOCOL NUKE EXECUTED. AREA CLEARED.</div>
        </div>`;
    });

    /* ==========================================================================
       4. 通讯收发引擎与交互优化
       ========================================================================== */
    const msgInput = document.getElementById('msg-input');
    
    // ✍️ 【自动长高优化】：监听输入高度
    function adjustTextareaHeight() {
      msgInput.style.height = '24px'; // 归位计算
      msgInput.style.height = msgInput.scrollHeight + 'px'; // 重新伸展
    }
    msgInput.addEventListener('input', adjustTextareaHeight);
    
    // PC 端支持 Shift+Enter 换行，Enter 发送
    msgInput.addEventListener('keydown', e => {
      if(e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        submitMessage(); 
      }
    });

    // 📱 【手机端键盘防丢失发送Bug修复】: 拦截 pointerdown 取代 click
    document.getElementById('btn-send').addEventListener('pointerdown', e => {
      e.preventDefault(); // 阻止按钮抢占焦点导致输入框键盘掉落
      submitMessage();
    });

    function submitMessage() {
      const v = msgInput.value.trim();
      if(v && currRoom) { 
        socket.emit('chat message', { room: currRoom, sender: currUser, text: v, msgType: 'text' }); 
        msgInput.value = ''; 
        adjustTextareaHeight();
        isEmojiVisible=false; document.getElementById('emoji-picker').style.display='none'; 
      }
    }

    // 📸 【修复图片按钮失效 Bug】
    document.getElementById('btn-upload').onclick = () => {
      document.getElementById('file-upload-input').click();
    };

    document.getElementById('file-upload-input').addEventListener('change', function(e) {
      const f = e.target.files[0]; if(!f) return;
      if(f.size>2.5*1024*1024) return toast('Image exceeds 2.5MB payload limit.', 'error');
      const r = new FileReader(); r.onload = ev => socket.emit('chat message', { room: currRoom, sender: currUser, text: ev.target.result, msgType: 'image' });
      r.readAsDataURL(f); this.value=''; // 重置 input 确保选同一张图能触发
    });

    // 往下滚动引擎 (只在底部时才自动滚，防打扰)
    function autoScrollDown() {
      const v = document.getElementById('messages-view');
      // 如果当前距离底部不超过 100px，或者是刚切换房间，才自动往下拉
      if (v.scrollHeight - v.scrollTop - v.clientHeight < 150) {
        v.scrollTop = v.scrollHeight;
      }
    }

    socket.on('load history', h => { 
      const view = document.getElementById('messages-view');
      view.innerHTML=''; h.forEach(renderMsg); 
      // 首次加载历史直接到底部
      view.scrollTop = view.scrollHeight; 
    });

    socket.on('chat message', m => {
      renderMsg(m);
      autoScrollDown(); // 智能滚动
      if(m.sender !== currUser && "Notification" in window && Notification.permission === "granted" && document.hidden) {
        new Notification(`JR Chat: ${m.sender}`, { body: m.msgType==='image'?'[Image]':m.text }).onclick = () => window.focus();
      }
    });

    function renderMsg(m) {
      const view = document.getElementById('messages-view');
      const isMe = m.sender === currUser;
      const tFormat = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'Now';
      
      let html = '';
      if(m.msgType === 'image') html = `<img src="${m.text}" class="msg-image" onclick="openLightbox('${m.text}')" />`;
      else html = `<div class="msg-bubble">${parseText(m.text)}</div>`;

      const wrap = document.createElement('div');
      wrap.className = `message-group ${isMe ? 'self' : ''}`;
      wrap.innerHTML = `
        <div class="msg-avatar" style="background:${genColor(m.sender)};color:white;">${sanitize(m.sender)[0].toUpperCase()}</div>
        <div class="msg-body">
          <div class="msg-meta">
            ${!isMe ? `<span class="msg-sender">${sanitize(m.sender)}</span>` : ''}
            <span class="msg-time">${tFormat}</span>
          </div>
          ${html}
        </div>`;
      view.appendChild(wrap);
    }

    /* ==========================================================================
       5. 上帝控制台 (Admin Dashboard)
       ========================================================================== */
    window.openAdmin = () => { document.getElementById('admin-dash').style.display='flex'; socket.emit('admin fetch data', currUser); };
    
    socket.on('admin data loaded', ({ users }) => {
      const list = document.getElementById('ad-user-list');
      list.innerHTML = `<div style="color:var(--text-muted);font-weight:700;margin-bottom:15px;text-transform:uppercase;">Network Entities (${users.length})</div>`;
      users.forEach(u => {
        if(u.username==='admin') return;
        const btnAct = u.isBanned?'ad-btn-warn':'ad-btn-danger';
        list.innerHTML += `
          <div class="user-card">
            <div>
              <div style="font-weight:700;color:#fff;">${sanitize(u.username)} ${u.isBanned?'<i class="fa-solid fa-ban" style="color:red"></i>':''}</div>
              <div style="font-size:12px;color:gray;margin-top:4px;">Nodes: ${u.groups.length} | Links: ${u.friends.length}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <button class="ad-btn ${btnAct}" onclick="socket.emit('admin toggle ban',{adminUser:'${currUser}',targetUser:'${u.username}',banStatus:${!u.isBanned}});setTimeout(openAdmin,500);">${u.isBanned?'Lift Ban':'Execute Ban'}</button>
              <button class="ad-btn" style="background:rgba(96,165,250,0.2);color:#60a5fa;" onclick="const p=prompt('Override Password:');if(p)socket.emit('admin reset password',{adminUser:'${currUser}',targetUser:'${u.username}',newPassword:p})">Override Pwd</button>
            </div>
          </div>`;
      });
    });

    window.adminFetch = () => { const r = document.getElementById('ad-search').value.trim(); if(r) socket.emit('admin fetch room history', { adminUser: currUser, roomId: r }); };
    
    socket.on('admin room history loaded', msgs => {
      const b = document.getElementById('ad-viewer'); b.innerHTML = '';
      if(!msgs.length) return b.innerHTML = '<span style="color:#ef4444;">[SYSTEM] Target node empty or non-existent.</span>';
      msgs.forEach(m => {
        const d = new Date(m.timestamp).toISOString().split('T');
        b.innerHTML += `<div style="margin-bottom:6px;border-bottom:1px dashed rgba(255,255,255,0.1);padding-bottom:6px;">
          <span style="color:#10b981;">[${d[0]} ${d[1].substring(0,8)}]</span> 
          <span style="color:#60a5fa;font-weight:bold;">${sanitize(m.sender)}</span> > 
          <span style="color:#cbd5e1;">${m.msgType==='text'?sanitize(m.text):'[BINARY IMAGE DATA]'}</span>
        </div>`;
      });
      b.scrollTop = b.scrollHeight;
    });
  </script>
</body>
</html>
