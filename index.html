<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JRchat - Telegram Edition</title>
  <style>
    /* 全局重置 */
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 0; 
      display: flex; height: 100vh; 
      background-color: #ffffff;
      overflow: hidden;
    }

    /* 左侧：群聊列表侧边栏 */
    .sidebar {
      width: 300px;
      background: #ffffff;
      border-right: 1px solid #dfe1e5;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
    }
    .hamburger-btn {
      background: none; border: none; padding: 0; cursor: pointer; color: #707579;
    }
    .search-bar {
      flex: 1; background: #f4f4f5; border-radius: 22px; padding: 8px 16px;
      display: flex; align-items: center;
    }
    .search-bar input {
      border: none; background: transparent; outline: none; width: 100%;
      font-size: 15px; color: #000;
    }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item {
      display: flex; padding: 10px 16px; align-items: center; cursor: pointer;
      transition: background 0.2s;
    }
    .chat-item:hover { background: #f4f4f5; }
    .chat-item.active { background: #3390ec; color: white; }
    
    /* 自动生成的字母头像 */
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      color: white; font-weight: bold; font-size: 18px; margin-right: 12px;
      flex-shrink: 0;
    }
    .chat-item-info { flex: 1; overflow: hidden; }
    .chat-item-title { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
    .chat-item-preview { font-size: 14px; color: #707579; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item.active .chat-item-preview { color: rgba(255,255,255,0.8); }

    /* 右侧：主聊天区域 */
    .main-chat {
      flex: 1; display: flex; flex-direction: column;
      background-color: #8daee3; /* Telegram 经典护眼聊天背景蓝 */
      background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M10 10h10v10H10z" fill="rgba(255,255,255,0.05)"/></svg>'); /* 模拟背景暗纹 */
      position: relative;
    }
    .chat-header {
      background: #ffffff; height: 60px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 10;
    }
    .chat-title-container { display: flex; flex-direction: column; }
    .chat-title { font-weight: 600; font-size: 16px; color: #000; }
    .chat-status { font-size: 13px; color: #707579; margin-top: 2px; }
    
    .jr-logo {
      font-weight: 900; font-size: 20px; font-style: italic;
      color: #3390ec; letter-spacing: 1px;
    }

    /* 消息列表区域 */
    .messages-container {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    
    .msg-row { display: flex; width: 100%; }
    .msg-row.in { justify-content: flex-start; }
    .msg-row.out { justify-content: flex-end; }
    
    .bubble {
      max-width: 65%; padding: 6px 12px; border-radius: 12px;
      font-size: 15px; line-height: 1.4; position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word;
      display: flex; flex-direction: column;
    }
    .msg-row.in .bubble { background: #ffffff; border-bottom-left-radius: 0; }
    .msg-row.out .bubble { background: #eeffde; border-bottom-right-radius: 0; }

    .msg-sender-name { font-weight: 500; font-size: 13px; margin-bottom: 2px; cursor: pointer; }
    .msg-row.out .msg-sender-name { display: none; } /* 自己发的消息不显示名字 */

    .msg-text { margin-bottom: 14px; } /* 为右下角时间留出空间 */
    
    .msg-time {
      font-size: 11px; color: #a0acb6; position: absolute;
      bottom: 4px; right: 8px;
    }
    .msg-row.out .msg-time { color: #5fb04b; }

    /* 底部输入框 */
    .input-area {
      background: #ffffff; padding: 10px 20px;
      display: flex; align-items: center; gap: 15px;
      padding-bottom: env(safe-area-inset-bottom, 10px);
    }
    .icon-btn {
      background: none; border: none; color: #8c97a2; cursor: pointer;
      display: flex; justify-content: center; align-items: center; padding: 5px;
      transition: color 0.2s;
    }
    .icon-btn:hover { color: #3390ec; }
    .icon-btn.send { color: #3390ec; background: #f4f4f5; border-radius: 50%; width: 40px; height: 40px; }
    .icon-btn.send:hover { background: #3390ec; color: #fff; }

    .input-wrapper {
      flex: 1; background: transparent; display: flex; align-items: center;
    }
    .input-wrapper input {
      width: 100%; border: none; outline: none; font-size: 16px;
      padding: 10px 0; background: transparent;
    }

    /* 响应式：在窄屏幕手机上折叠侧边栏 */
    @media (max-width: 768px) {
      .sidebar { width: 80px; }
      .chat-item-info, .search-bar { display: none; }
      .chat-item { justify-content: center; padding: 10px 0; }
      .avatar { margin-right: 0; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <button class="hamburger-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="search-bar">
        <input type="text" placeholder="搜索">
      </div>
    </div>
    <div class="chat-list" id="chat-list">
      </div>
  </div>

  <div class="main-chat">
    <div class="chat-header">
      <div class="chat-title-container">
        <div class="chat-title" id="current-room-title">大厅</div>
        <div class="chat-status">2 成员在线</div>
      </div>
      <div class="jr-logo">JRchat</div>
    </div>

    <div class="messages-container" id="messages">
      </div>

    <form class="input-area" id="form" action="">
      <button type="button" class="icon-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
      </button>
      <div class="input-wrapper">
        <input id="input" autocomplete="off" placeholder="写消息..." />
      </div>
      <button type="submit" class="icon-btn send">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const chatList = document.getElementById('chat-list');
    const roomTitle = document.getElementById('current-room-title');

    // Telegram 经典色彩库 (用于随机生成名字颜色)
    const tlColors = ['#e56555', '#f28c48', '#8e85ee', '#549cdd', '#4cb382', '#55bad9', '#d2547b'];
    
    // 根据字符串计算哈希，固定分配一种颜色
    function getColorByName(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return tlColors[Math.abs(hash) % tlColors.length];
    }

    // 房间配置
    const rooms = [
      { id: '大厅', preview: '欢迎来到 JRchat 主频道' },
      { id: '极客技术', preview: '讨论代码与前沿科技' },
      { id: '日常摸鱼', preview: '工作累了？来聊两句' }
    ];

    let myName = prompt("请输入您的 JRchat 昵称：");
    if (!myName || myName.trim() === '') myName = "特工" + Math.floor(Math.random() * 1000);
    
    let currentRoom = rooms[0].id;

    // 渲染左侧群聊列表
    function renderSidebar() {
      chatList.innerHTML = '';
      rooms.forEach(room => {
        const isActive = room.id === currentRoom ? 'active' : '';
        const roomColor = getColorByName(room.id);
        const firstLetter = room.id.charAt(0);
        
        const item = document.createElement('div');
        item.className = `chat-item ${isActive}`;
        item.onclick = () => switchRoom(room.id);
        
        item.innerHTML = `
          <div class="avatar" style="background-color: ${roomColor}">${firstLetter}</div>
          <div class="chat-item-info">
            <div class="chat-item-title">${room.id}</div>
            <div class="chat-item-preview">${room.preview}</div>
          </div>
        `;
        chatList.appendChild(item);
      });
    }

    // 切换房间
    function switchRoom(newRoom) {
      if (currentRoom === newRoom) return;
      currentRoom = newRoom;
      roomTitle.innerText = newRoom;
      messages.innerHTML = ''; 
      renderSidebar();
      socket.emit('join room', currentRoom);
    }

    // 初始化
    renderSidebar();
    socket.emit('join room', currentRoom);

    // 渲染消息气泡
    function renderMessage(data) {
      const row = document.createElement('div');
      const isMe = data.sender === myName;
      row.className = `msg-row ${isMe ? 'out' : 'in'}`;

      const nameColor = getColorByName(data.sender);
      
      // 处理时间戳 (如果是实时收到的消息可能没带 timestamp，我们就取当前浏览器时间)
      let timeStr = '';
      if (data.timestamp) {
        timeStr = new Date(data.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      } else {
        timeStr = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }

      row.innerHTML = `
        <div class="bubble">
          <div class="msg-sender-name" style="color: ${nameColor}">${data.sender}</div>
          <div class="msg-text">${data.text}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      `;
      messages.appendChild(row);
    }

    // 发送消息
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value.trim()) {
        const msgData = { room: currentRoom, sender: myName, text: input.value };
        socket.emit('chat message', msgData);
        input.value = '';
      }
    });

    // 监听网络事件
    socket.on('load history', function(historyArray) {
      messages.innerHTML = ''; 
      historyArray.forEach(msgData => renderMessage(msgData));
      messages.parentElement.scrollTo(0, messages.parentElement.scrollHeight);
    });

    socket.on('chat message', function(msgData) {
      renderMessage(msgData);
      messages.parentElement.scrollTo({ top: messages.parentElement.scrollHeight, behavior: 'smooth' });
    });
  </script>
</body>
</html>
