<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0f14" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JR System">
  
  <title>JRchat</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

  <style>
    :root {
      --bg-base: #0f111a; --bg-sidebar: rgba(18, 20, 28, 0.85); --bg-panel: #1a1d27; --bg-message: #222634; --bg-message-self: #6366f1;
      --accent-color: #6366f1; --accent-hover: #4f46e5; --accent-glow: rgba(99, 102, 241, 0.4);
      --danger-color: #ef4444; --danger-bg: rgba(239, 68, 68, 0.15); --success-color: #10b981; --music-neon: #00f2ff; --call-neon: #34d399;
      --text-main: #f8fafc; --text-secondary: #cbd5e1; --text-muted: #64748b;
      --border-light: rgba(255, 255, 255, 0.08); --border-strong: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); --bubble-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      --blur-md: blur(16px); --blur-lg: blur(32px);
    }

    [data-theme="amoled"] { --bg-base: #000000; --bg-sidebar: rgba(0, 0, 0, 0.9); --bg-panel: #0a0a0a; --bg-message: #121212; --border-light: rgba(255, 255, 255, 0.1); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-base); color: var(--text-main); height: 100dvh; overflow: hidden; display: flex; transition: background 0.3s ease; }
    a { color: var(--accent-color); text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    /* ==========================================================================
       [UI 浮層與基礎元件]
       ========================================================================== */
    #toast-wrap { position: fixed; top: calc(20px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast-item { background: rgba(20, 22, 30, 0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; color: #fff; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .toast-item.success i { color: var(--success-color); } .toast-item.error i { color: var(--danger-color); }

    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 8000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.2s; }
    .modal-box { background: rgba(20,22,30,0.95); border: 1px solid var(--border-strong); width: 90%; max-width: 360px; border-radius: 20px; padding: 24px; box-shadow: var(--glass-shadow); transform: scale(0.95); transition: 0.2s; }
    .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-input-field { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-light); color: #fff; border-radius: 10px; outline: none; margin-bottom: 20px; font-size: 14px; transition: 0.2s; }
    .modal-input-field:focus { border-color: var(--accent-color); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
    .m-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
    .m-btn.cancel { background: transparent; color: var(--text-muted); }
    .m-btn.confirm { background: var(--accent-color); color: #fff; }
    .m-btn.danger { background: var(--danger-bg); color: var(--danger-color); }

    #context-menu { position: fixed; background: rgba(20, 22, 30, 0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); border-radius: 10px; padding: 6px; box-shadow: var(--glass-shadow); z-index: 9000; display: none; flex-direction: column; min-width: 140px; animation: scaleIn 0.15s ease-out; }
    .ctx-item { padding: 8px 12px; color: var(--text-main); font-size: 13px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .ctx-item:hover { background: var(--accent-color); color: #fff; }

    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
    #lightbox-img { max-width: 90%; max-height: 85dvh; border-radius: 12px; transform: scale(0.95); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .lightbox-close { position: absolute; top: calc(20px + env(safe-area-inset-top, 0px)); right: 20px; background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; }

    /* ==========================================================================
       [認證穹頂 - Auth Screen (含忘記密碼邏輯)]
       ========================================================================== */
    #auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background-image: linear-gradient(rgba(15, 17, 26, 0.7), rgba(15, 17, 26, 0.9)), url('https://raw.githubusercontent.com/zhangzhanhang855/JRchat/main/bg.jpg'); background-size: cover; background-position: center; transition: opacity 0.5s, visibility 0.5s; }
    .auth-card { background: rgba(20, 24, 34, 0.5); backdrop-filter: var(--blur-lg); -webkit-backdrop-filter: var(--blur-lg); border: 1px solid var(--border-strong); padding: 40px 35px; border-radius: 28px; width: 90%; max-width: 380px; text-align: center; box-shadow: var(--glass-shadow); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden;}
    .auth-card h2 { font-weight: 800; font-size: 26px; margin-bottom: 5px; color: #fff; }
    .auth-input-group { position: relative; margin-top: 15px; }
    .auth-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
    .auth-input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-light); color: #fff; border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s; }
    .auth-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-glow); }
    .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent-color); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 20px; margin-bottom: 15px; transition: 0.2s; box-shadow: 0 4px 15px var(--accent-glow); }
    .auth-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .auth-switch { color: var(--text-secondary); font-size: 13px; cursor: pointer; font-weight: 500; transition: 0.2s; margin-top: 10px;}
    .auth-switch:hover { color: #fff; text-decoration: underline;}
    
    /* 忘記密碼區域隱藏 */
    .forgot-group { display: none; } 

    /* ==========================================================================
       [個人檔案面版 - Profile Dashboard]
       ========================================================================== */
    #profile-dash { position: fixed; inset: 0; background: rgba(10, 10, 15, 0.85); backdrop-filter: var(--blur-lg); z-index: 8500; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
    .profile-card-lg { background: var(--bg-panel); border: 1px solid var(--border-strong); width: 90%; max-width: 420px; border-radius: 24px; overflow: hidden; box-shadow: var(--glass-shadow); transform: scale(0.95); transition: 0.3s; position: relative; }
    .profile-header-bg { height: 120px; background: linear-gradient(135deg, var(--accent-color), #a855f7); position: relative; }
    .profile-close-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
    .profile-close-btn:hover { background: rgba(0,0,0,0.6); }
    .profile-avatar-lg { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--bg-panel); background: var(--bg-message); position: absolute; bottom: -40px; left: 24px; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); background-size: cover; background-position: center; cursor: pointer;}
    .profile-body { padding: 50px 24px 24px; }
    .profile-name-lg { font-size: 22px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
    .profile-email { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; font-family: monospace; }
    .profile-bio-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border-light); padding: 12px; border-radius: 12px; margin-bottom: 24px; position: relative; }
    .profile-bio-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; outline: none; border: none; background: transparent; width: 100%; resize: none; }
    
    .profile-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .p-btn { padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; color: #fff; }
    .p-btn.primary { background: var(--accent-color); } .p-btn.primary:hover { background: var(--accent-hover); }
    .p-btn.secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); } .p-btn.secondary:hover { background: rgba(255,255,255,0.1); }
    .p-btn.danger { background: var(--danger-bg); color: var(--danger-color); } .p-btn.danger:hover { background: var(--danger-color); color: #fff; }
    .p-btn.full { grid-column: span 2; }
    
    /* 上傳大頭貼隱藏框 */
    #avatar-upload-input { display: none; }

    /* ==========================================================================
       [主聊天框架]
       ========================================================================== */
    #app-container { display: flex; width: 100%; height: 100dvh; }
    #sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: var(--blur-md); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; z-index: 100; transition: 0.3s; flex-shrink: 0; }
    .sidebar-header { padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); }
    .sidebar-brand { font-size: 18px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
    .theme-toggle { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: 0.2s; }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .section-title { padding: 10px 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    .nav-item { padding: 10px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; overflow: hidden; }
    .nav-item i { width: 18px; text-align: center; opacity: 0.6; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
    .nav-item.active { background: rgba(99, 102, 241, 0.15); color: var(--accent-hover); }
    .nav-item.active i { opacity: 1; color: var(--accent-color); }
    .status-dot { width: 6px; height: 6px; background: var(--success-color); border-radius: 50%; box-shadow: 0 0 5px var(--success-color); margin-left: auto; display: none; }
    .nav-item.is-online .status-dot { display: block; }
    
    .sidebar-footer { padding: 15px 15px calc(15px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid var(--border-light); background: rgba(0,0,0,0.15); }
    .profile-card { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 6px; border-radius: 10px; background: rgba(255,255,255,0.02); cursor: pointer; transition: 0.2s; }
    .profile-card:hover { background: rgba(255,255,255,0.05); }
    .profile-avatar { width: 34px; height: 34px; border-radius: 10px; background: var(--accent-color); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; background-size: cover; background-position: center;}
    .profile-info { flex: 1; overflow: hidden; }
    .profile-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: 0.2s; }
    .logout-btn:hover { color: var(--danger-color); }
    
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .q-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); color: var(--text-main); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
    .q-btn:hover { background: rgba(255,255,255,0.08); }
    .q-btn.full { grid-column: span 2; }
    .q-btn.admin { display: none; background: rgba(245, 158, 11, 0.1); color: #fcd34d; border-color: rgba(245, 158, 11, 0.2); }
    .q-btn.music { background: rgba(0, 242, 255, 0.1); color: var(--music-neon); border-color: rgba(0, 242, 255, 0.3); }

    #main-chat { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.05), transparent 60%); min-width: 0; }
    .chat-header { padding: calc(12px + env(safe-area-inset-top, 0px)) 24px 12px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; background: rgba(15, 17, 26, 0.6); backdrop-filter: var(--blur-md); z-index: 10; }
    .header-info { display: flex; align-items: center; gap: 12px; }
    .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; }
    .chat-title-group { display: flex; flex-direction: column; gap: 2px; }
    .chat-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px;}
    .chat-subtitle { font-size: 11px; color: var(--text-muted); }
    .header-actions { display: flex; gap: 8px; }
    .tool-btn { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; transition: 0.2s; }
    .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .tool-btn.danger:hover { background: var(--danger-bg); color: var(--danger-color); }
    .tool-btn.call { color: var(--call-neon); }
    .tool-btn.call:hover { background: rgba(52, 211, 153, 0.15); border-color: rgba(52, 211, 153, 0.3); }

    #messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .message-group { display: flex; gap: 10px; max-width: 85%; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .message-group.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; cursor: pointer; background-size: cover; background-position: center;}
    .msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .message-group.self .msg-body { align-items: flex-end; }
    .msg-meta { display: flex; gap: 8px; margin: 0 2px; align-items: baseline; }
    .message-group.self .msg-meta { flex-direction: row-reverse; }
    .msg-sender { font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer;}
    .msg-time { font-size: 10px; color: var(--text-muted); }
    .msg-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.5; background: var(--bg-message); border: 1px solid var(--border-light); color: var(--text-main); border-radius: 4px 16px 16px 16px; word-break: break-word; }
    .message-group.self .msg-bubble { background: var(--bg-message-self); border-color: var(--accent-color); color: #fff; border-radius: 16px 4px 16px 16px; }
    .msg-bubble a { color: #60a5fa; text-decoration: underline; }
    .msg-image { max-width: 250px; max-height: 250px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border-light); object-fit: cover; }

    .input-area { padding: 10px 20px calc(15px + env(safe-area-inset-bottom, 0px)); background: transparent; }
    .input-wrapper { display: flex; gap: 8px; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border-strong); align-items: flex-end; backdrop-filter: var(--blur-md); transition: 0.3s; }
    .input-wrapper:focus-within { border-color: var(--accent-color); background: rgba(0,0,0,0.4); }
    .input-tools { display: flex; gap: 2px; padding-bottom: 2px; }
    .textarea-box { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; resize: none; max-height: 100px; height: 24px; padding: 2px 4px; line-height: 1.5; font-family: inherit; }
    .textarea-box::placeholder { color: var(--text-muted); }
    .send-action { padding-bottom: 2px; }
    .btn-send { background: var(--accent-color); color: white; border: none; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: 0.2s; }
    #file-upload-input { display: none; }

    #emoji-picker { position: absolute; bottom: calc(75px + env(safe-area-inset-bottom, 0px)); left: 20px; background: rgba(20,22,30,0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); border-radius: 12px; padding: 10px; width: 280px; box-shadow: var(--glass-shadow); display: none; grid-template-columns: repeat(6, 1fr); gap: 6px; z-index: 50; max-height: 200px; overflow-y: auto; }
    .emoji-item { font-size: 20px; cursor: pointer; text-align: center; padding: 4px; border-radius: 6px; transition: 0.2s; }

    /* ==========================================================================
       [WebRTC 語音通話懸浮控制台]
       ========================================================================== */
    #call-widget { position: fixed; top: calc(20px + env(safe-area-inset-top, 0px)); right: 20px; background: rgba(20, 22, 30, 0.95); backdrop-filter: var(--blur-md); border: 1px solid var(--border-strong); border-radius: 16px; padding: 12px 16px; display: none; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 9500; animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .call-avatar { width: 40px; height: 40px; border-radius: 12px; background: var(--call-neon); color: #000; font-weight: bold; display: flex; justify-content: center; align-items: center; font-size: 16px; box-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }
    .call-info { display: flex; flex-direction: column; min-width: 100px; }
    .call-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .call-status { font-size: 11px; color: var(--call-neon); font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .call-status.ringing { color: #facc15; animation: blink 1.5s infinite; }
    .call-actions { display: flex; gap: 8px; margin-left: 10px; }
    .call-btn { width: 36px; height: 36px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; transition: 0.2s; color: #fff; }
    .call-btn.accept { background: var(--success-color); } .call-btn.reject { background: var(--danger-color); }
    @keyframes blink { 50% { opacity: 0.5; } }

    /* Admin & Music 省略部分樣式以保證長度，與之前一致 */
    #admin-dash, #music-dash { position: fixed; inset: 0; background: var(--bg-base); z-index: 7000; display: none; flex-direction: column; }
    .ad-header, .m-header { padding: calc(16px + env(safe-area-inset-top, 0px)) 24px 16px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
    .ad-body, .m-body { flex: 1; display: flex; overflow: hidden; }
    .ad-sidebar, .m-left, .m-right { width: 280px; border-right: 1px solid var(--border-light); padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }
    .ad-main, .m-center { flex: 1; padding: 24px; overflow-y: auto; }
    .m-center { display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ad-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
    .ad-btn-warn { background: rgba(234, 179, 8, 0.15); color: #facc15; }
    .ad-viewer { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 16px; height: 400px; overflow-y: auto; border: 1px solid var(--border-light); font-size: 13px; font-family: monospace; color: #a1a1aa; }
    
    .m-lcd { background: #050a05; border: 2px solid #000; border-radius: 8px; padding: 15px; width: 100%; max-width: 350px; text-align: center; margin-bottom: 40px; }
    .m-lcd-time { font-family: 'Share Tech Mono', monospace; font-size: 28px; font-weight: bold; color: #fff; }
    .m-vinyl-wrap { width: 260px; height: 260px; border-radius: 50%; background: #000; border: 8px solid #222; position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 40px; }
    .m-cover-art { width: 35%; height: 35%; border-radius: 50%; border: 3px solid #111; background: #333; z-index: 10; background-size: cover; background-position: center; position: relative;}
    .m-vinyl-wrap.playing .m-cover-art { animation: m-spin 6s linear infinite; }
    @keyframes m-spin { to { transform: rotate(360deg); } }
    .m-controls { display: flex; align-items: center; gap: 20px; }
    .m-ctrl-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    .m-ctrl-play { width: 64px; height: 64px; background: var(--music-neon); color: #000; font-size: 20px; }

    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 768px) {
      .mobile-menu-btn { display: block; }
      #sidebar { position: fixed; height: 100dvh; transform: translateX(-100%); box-shadow: 10px 0 40px rgba(0,0,0,0.8); z-index: 200; width: 280px; }
      #sidebar.active { transform: translateX(0); }
      .message-group { max-width: 92%; }
      .chat-header { padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px; }
      #messages-view { padding: 16px; gap: 12px; }
      .ad-body, .m-body { flex-direction: column; overflow-y: auto;}
      .ad-sidebar, .m-left, .m-right { width: 100%; height: 250px; border-right: none; border-bottom: 1px solid var(--border-light); flex-shrink:0;}
      .m-center { height: 450px; flex-shrink:0;}
      #emoji-picker { width: calc(100vw - 40px); left: 20px; }
      #call-widget { right: 10px; left: 10px; top: calc(10px + env(safe-area-inset-top, 0px)); justify-content: space-between; }
    }
  </style>
</head>
<body>

  <!-- ================= 浮動元件庫 ================= -->
  <div id="toast-wrap"></div>
  <div id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-header" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <input type="text" class="modal-input-field" id="modal-input" autocomplete="off">
      <div class="modal-footer" id="modal-actions"></div>
    </div>
  </div>
  <div id="lightbox" onclick="closeLightbox()"><button class="lightbox-close"><i class="fa-solid fa-xmark"></i></button><img id="lightbox-img" src="" alt="預覽" onclick="event.stopPropagation()"></div>
  <div id="context-menu">
    <div class="ctx-item" onclick="ctxAction('copy')"><i class="fa-solid fa-copy"></i> 複製文字</div>
    <div class="ctx-item" style="color:var(--danger-color)" onclick="ctxAction('delete')"><i class="fa-solid fa-eye-slash"></i> 本地隱藏</div>
  </div>

  <!-- 📞 WebRTC 語音通話面板 -->
  <div id="call-widget">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="call-avatar" id="call-avatar">U</div>
      <div class="call-info">
        <div class="call-name" id="call-name">特工代號</div>
        <div class="call-status" id="call-status"><i class="fa-solid fa-satellite-dish"></i> 正在呼叫...</div>
      </div>
    </div>
    <div class="call-actions">
      <button class="call-btn accept" id="btn-accept-call" style="display:none;" onclick="acceptCall()"><i class="fa-solid fa-phone"></i></button>
      <button class="call-btn reject" id="btn-reject-call" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>
    <audio id="remote-audio" autoplay style="display:none;"></audio>
  </div>

  <!-- 🪪 個人檔案面版 (Profile Dashboard) -->
  <div id="profile-dash">
    <div class="profile-card-lg" id="profile-card-inner">
      <div class="profile-header-bg">
        <button class="profile-close-btn" onclick="document.getElementById('profile-dash').style.opacity=0; setTimeout(()=>document.getElementById('profile-dash').style.display='none',300);"><i class="fa-solid fa-xmark"></i></button>
        <div class="profile-avatar-lg" id="prof-avatar" onclick="triggerAvatarUpload()">X</div>
        <input type="file" id="avatar-upload-input" accept="image/png, image/jpeg, image/gif" onchange="uploadAvatar(event)">
      </div>
      <div class="profile-body">
        <div class="profile-name-lg" id="prof-name">Username <i class="fa-solid fa-circle-check" style="color:var(--success-color); font-size:16px;"></i></div>
        <div class="profile-email" id="prof-email">user@domain.com</div>
        
        <div class="profile-bio-box">
          <div style="font-size:11px; color:var(--accent-color); font-weight:bold; margin-bottom:5px; text-transform:uppercase;">Agent Bio</div>
          <textarea class="profile-bio-text" id="prof-bio" rows="3" readonly></textarea>
        </div>
        
        <div class="profile-actions" id="prof-actions">
          <!-- 動態生成按鈕 -->
        </div>
      </div>
    </div>
  </div>

  <!-- Admin 控制台 -->
  <div id="admin-dash">
    <div class="ad-header">
      <h2 style="font-size:18px;"><i class="fa-solid fa-terminal"></i> 根節點儀表板</h2>
      <button class="ad-btn ad-btn-warn" onclick="document.getElementById('admin-dash').style.display='none'">關閉</button>
    </div>
    <div class="ad-body">
      <div class="ad-sidebar" id="ad-user-list"></div>
      <div class="ad-main">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <input type="text" id="ad-search" class="modal-input-field" placeholder="目標 ID" style="margin:0; max-width:200px;">
          <button class="ad-btn ad-btn-warn" onclick="adminFetch()">檢索數據流</button>
        </div>
        <div id="ad-viewer" class="ad-viewer">等待系統指令...</div>
      </div>
    </div>
  </div>

  <!-- JR Music 引擎 -->
  <div id="music-dash">
    <div class="m-header">
      <h2 style="font-size:18px; color:#fff; font-weight:800;"><i class="fa-solid fa-music" style="color:var(--music-neon);"></i> 音樂子系統</h2>
      <button class="m-btn cancel" style="color:#fff;" onclick="document.getElementById('music-dash').style.display='none'">隱藏 (背景播放)</button>
    </div>
    <div class="m-body">
      <div class="m-panel m-left">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
          <input type="text" id="m-gh-user" class="modal-input-field" style="margin:0;padding:8px;" placeholder="GitHub User">
          <input type="text" id="m-gh-repo" class="modal-input-field" style="margin:0;padding:8px;" placeholder="Repo">
        </div>
        <button class="ad-btn ad-btn-warn" style="width:100%;margin-bottom:10px;" id="m-btn-sync">執行同步</button>
        <div id="m-nav" style="display:flex;gap:5px;overflow-x:auto;"></div>
        <ul id="m-track-list" style="list-style:none; margin-top:10px; font-size:13px; color:gray;"></ul>
      </div>
      <div class="m-panel m-center">
        <div class="m-lcd"><div id="m-title" style="color:var(--music-neon);margin-bottom:5px;font-weight:bold;">待機</div><div id="m-time" class="m-lcd-time">00:00:00</div></div>
        <div class="m-vinyl-wrap" id="m-vinyl"><div class="m-cover-art" id="m-cover"><span id="m-emoji" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;">💿</span></div></div>
        <div class="m-controls">
          <button class="m-ctrl-btn" id="m-btn-prev"><i class="fa-solid fa-backward-step"></i></button>
          <button class="m-ctrl-btn m-ctrl-play" id="m-btn-play"><i class="fa-solid fa-play" id="m-play-icon"></i></button>
          <button class="m-ctrl-btn" id="m-btn-next"><i class="fa-solid fa-forward-step"></i></button>
        </div>
      </div>
      <div class="m-panel m-right">
        <div id="m-lyric-status" style="text-align:center;font-size:12px;color:var(--music-neon);">歌詞掃描</div>
        <div id="m-lyric-container" style="flex:1;overflow-y:auto;text-align:center;padding:50% 0;"><div id="m-lyric-content" style="color:gray;font-size:12px;">等待音訊...</div></div>
      </div>
    </div>
    <audio id="m-audio" playsinline></audio>
  </div>

  <!-- 🔐 登入驗證系統 (含忘記密碼) -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand"><i class="fa-brands fa-space-awesome"></i></div>
      <h2>JR System</h2>
      <div style="color:var(--text-muted); font-size:12px; margin-bottom:20px;">安全閘道器 V6</div>
      
      <!-- 登入/註冊共用欄位 -->
      <div class="auth-input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="auth-usr" class="auth-input" placeholder="特工代號 (Username)" autocomplete="off">
      </div>
      
      <!-- 僅註冊/忘記密碼時顯示 -->
      <div class="auth-input-group reg-only forgot-only" style="display:none;">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="auth-email" class="auth-input" placeholder="安全信箱 (Email)" autocomplete="off">
      </div>
      
      <div class="auth-input-group default-only forgot-only" style="display:none;" id="code-group">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="text" id="auth-code" class="auth-input" placeholder="6位數驗證碼" autocomplete="off">
      </div>

      <div class="auth-input-group default-only reg-only forgot-only">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="auth-pwd" class="auth-input" placeholder="存取金鑰 (Password)">
      </div>
      
      <button class="auth-btn default-only" id="btn-login" onclick="execLogin()">建立連線</button>
      <button class="auth-btn reg-only" id="btn-register" onclick="execRegister()" style="display:none; background:#0ea5e9;">註冊身份</button>
      
      <!-- 忘記密碼按鈕組 -->
      <button class="auth-btn forgot-only" id="btn-get-code" onclick="requestCode()" style="display:none; background:#f59e0b;">獲取驗證碼</button>
      <button class="auth-btn forgot-only" id="btn-reset-pwd" onclick="execResetPwd()" style="display:none; background:#10b981;">重設金鑰</button>

      <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:13px; color:var(--text-muted);">
        <span class="auth-switch" onclick="switchAuthMode('register')" id="switch-reg">註冊新特工</span>
        <span class="auth-switch" onclick="switchAuthMode('login')" id="switch-log" style="display:none;">返回登入</span>
        <span class="auth-switch" onclick="switchAuthMode('forgot')" id="switch-fgt">忘記密碼？</span>
      </div>
    </div>
  </div>

  <!-- 核心聊天框架 -->
  <div id="app-container">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand"><i class="fa-brands fa-strikethrough" style="color:var(--accent-color);"></i> JR Chat</div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
      </div>
      <div class="sidebar-scroll" id="nav-list"></div>
      <div class="sidebar-footer">
        <div class="profile-card" onclick="viewProfile(currUser)">
          <div class="profile-avatar" id="my-avatar">X</div>
          <div class="profile-info">
            <div class="profile-name" id="my-name">Agent</div>
            <div class="profile-status">安全加密</div>
          </div>
        </div>
        <div class="quick-actions">
          <button class="q-btn" onclick="openModal('createGroup')"><i class="fa-solid fa-plus"></i> 建群</button>
          <button class="q-btn" onclick="openModal('joinGroup')"><i class="fa-solid fa-satellite"></i> 搜群</button>
          <button class="q-btn full" onclick="openModal('addFriend')"><i class="fa-solid fa-user-astronaut"></i> 建立通訊羈絆</button>
          <button class="q-btn full" style="color:var(--music-neon);border-color:rgba(0,242,255,0.3);" onclick="document.getElementById('music-dash').style.display='flex'"><i class="fa-solid fa-compact-disc"></i> 啟動音樂模組</button>
          <button class="q-btn full admin" id="btn-admin" onclick="openAdmin()"><i class="fa-solid fa-skull-crossbones"></i> ROOT 管理台</button>
        </div>
      </div>
    </aside>

    <main id="main-chat">
      <header class="chat-header">
        <div class="header-info">
          <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.add('active'); event.stopPropagation();"><i class="fa-solid fa-bars-staggered"></i></button>
          <div class="chat-title-group">
            <div class="chat-title" id="room-title"><i class="fa-solid fa-hashtag" style="color:var(--text-muted)"></i> 大廳</div>
            <div class="chat-subtitle" id="room-subtitle">ID: General</div>
          </div>
        </div>
        <div class="header-actions" id="room-tools"></div>
      </header>
      
      <div id="messages-view"></div>
      
      <input type="file" id="file-upload-input" accept="image/*" style="display:none;">
      <div id="emoji-picker"></div>
      
      <div class="input-area">
        <div class="input-wrapper" id="input-wrap">
          <div class="input-tools">
            <button class="tool-icon" id="btn-emoji"><i class="fa-regular fa-face-smile"></i></button>
            <button class="tool-icon" id="btn-upload"><i class="fa-solid fa-image"></i></button>
          </div>
          <textarea class="textarea-box" id="msg-input" rows="1" placeholder="輸入訊息..."></textarea>
          <div class="send-action">
            <button class="btn-send" id="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  
  <script>
    const socket = io();
    let authSessionToken = '', currUser = '', currRoom = '', onlineSet = [];
    let currentTheme = localStorage.getItem('jrchat_theme') || 'dark'; applyTheme(currentTheme);
    let ctxTargetMessage = null, isEmojiVisible = false;
    let viewingProfileUser = ''; // 目前正在查看誰的 Profile
    const emojis = ["😀","😂","🤣","😊","🥰","😎","🤩","😏","😒","😔","😭","😡","🤯","🥳","🤫","🤔","🙄","🤢","🤠","😈","👻","👽","🤖","💩","👍","👎","👏","🤝","🙏","💪","🔥","✨","🎉","💯","❤️","💔","📷","💻","🚀"];

    // ==========================================
    // UI 基礎與事件
    // ==========================================
    document.addEventListener('click', e => {
      if(!e.target.closest('#context-menu') && !e.target.closest('.msg-bubble')) document.getElementById('context-menu').style.display='none';
      if(!e.target.closest('#emoji-picker') && !e.target.closest('#btn-emoji')) { isEmojiVisible=false; document.getElementById('emoji-picker').style.display='none'; }
      if(window.innerWidth<=768 && !e.target.closest('#sidebar') && !e.target.closest('.mobile-menu-btn')) document.getElementById('sidebar').classList.remove('active');
    });

    function toast(msg, type='info') {
      const wrap = document.getElementById('toast-wrap'); const el = document.createElement('div');
      el.className = `toast-item ${type}`; const icon = type==='success'?'fa-check-circle':type==='error'?'fa-triangle-exclamation':'fa-circle-info';
      el.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`; wrap.appendChild(el);
      setTimeout(() => { el.style.opacity=0; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(),400); }, 3000);
    }
    
    const mOverlay = document.getElementById('modal-overlay');
    function customModal({ title, desc, ph, hasInput=true, type='text', cText='確定', cClass='confirm', onOK }) {
      document.getElementById('modal-title').innerHTML = title; document.getElementById('modal-desc').innerText = desc;
      const inp = document.getElementById('modal-input'); inp.style.display = hasInput?'block':'none'; inp.type=type; inp.placeholder=ph||''; inp.value='';
      const acts = document.getElementById('modal-actions'); acts.innerHTML='';
      const btnCancel = document.createElement('button'); btnCancel.className='m-btn cancel'; btnCancel.innerText='取消'; btnCancel.onclick=()=>closeModal();
      const btnOK = document.createElement('button'); btnOK.className=`m-btn ${cClass}`; btnOK.innerText=cText;
      btnOK.onclick = () => { const v=inp.value.trim(); if(hasInput&&!v)return inp.focus(); onOK(v); closeModal(); };
      acts.append(btnCancel, btnOK);
      mOverlay.style.display='flex'; setTimeout(() => { mOverlay.style.opacity=1; document.getElementById('modal-box').style.transform='scale(1)'; if(hasInput)inp.focus(); }, 10);
    }
    function closeModal() { mOverlay.style.opacity=0; document.getElementById('modal-box').style.transform='scale(0.95)'; setTimeout(()=>mOverlay.style.display='none', 200); }

    function openLightbox(src) { const lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = src; lb.style.display='flex'; setTimeout(()=>{lb.style.opacity=1; document.getElementById('lightbox-img').style.transform='scale(1)';},10); }
    function closeLightbox() { const lb = document.getElementById('lightbox'); lb.style.opacity=0; document.getElementById('lightbox-img').style.transform='scale(0.95)'; setTimeout(()=>lb.style.display='none',300); }

    document.addEventListener('contextmenu', e => {
      const bubble = e.target.closest('.msg-bubble');
      if(bubble) { e.preventDefault(); ctxTargetMessage = bubble; const menu = document.getElementById('context-menu'); menu.style.display='flex';
        let x = e.pageX, y = e.pageY; if(x+140>window.innerWidth) x-=140; if(y+100>window.innerHeight) y-=100; menu.style.left=`${x}px`; menu.style.top=`${y}px`;
      }
    });
    function ctxAction(act) {
      document.getElementById('context-menu').style.display='none'; if(!ctxTargetMessage) return;
      if(act==='copy') { navigator.clipboard.writeText(ctxTargetMessage.innerText); toast('已複製', 'success'); }
      if(act==='delete') { ctxTargetMessage.closest('.message-group').style.display='none'; toast('已隱藏'); }
    }

    const ep = document.getElementById('emoji-picker');
    emojis.forEach(e => { const el=document.createElement('div'); el.className='emoji-item'; el.innerText=e; el.onclick=()=>{document.getElementById('msg-input').value+=e;adjustTextareaHeight();document.getElementById('msg-input').focus();}; ep.appendChild(el); });
    document.getElementById('btn-emoji').onclick = (e) => { isEmojiVisible=!isEmojiVisible; ep.style.display=isEmojiVisible?'grid':'none'; e.stopPropagation(); };

    function applyTheme(th) { document.documentElement.setAttribute('data-theme', th); document.getElementById('theme-color-meta').setAttribute('content', th==='amoled'?'#000000':'#0f111a'); localStorage.setItem('jrchat_theme', th); }
    function toggleTheme() { currentTheme=currentTheme==='dark'?'amoled':'dark'; applyTheme(currentTheme); }

    function genColor(str) { let h=0; for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h); return `hsl(${h%360},70%,65%)`; }
    function sanitize(raw) { return raw.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/'/g, "&#39;").replace(/"/g, "&quot;"); }
    function parseText(raw) { let t = sanitize(raw); t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>'); return t.replace(/\n/g, '<br>'); }

    // ==========================================
    // 🔐 認證與忘記密碼
    // ==========================================
    function switchAuthMode(mode) {
      const els = document.querySelectorAll('.default-only, .reg-only, .forgot-only');
      els.forEach(el => el.style.display = 'none');
      document.getElementById('switch-reg').style.display = 'none';
      document.getElementById('switch-log').style.display = 'none';
      document.getElementById('switch-fgt').style.display = 'none';

      if(mode === 'login') {
        document.querySelectorAll('.default-only').forEach(el => el.style.display = '');
        document.getElementById('switch-reg').style.display = '';
        document.getElementById('switch-fgt').style.display = '';
      } else if (mode === 'register') {
        document.querySelectorAll('.reg-only').forEach(el => el.style.display = '');
        document.getElementById('switch-log').style.display = '';
      } else if (mode === 'forgot') {
        document.querySelectorAll('.forgot-only').forEach(el => el.style.display = '');
        document.getElementById('btn-get-code').style.display = 'block';
        document.getElementById('btn-reset-pwd').style.display = 'none';
        document.getElementById('code-group').style.display = 'none';
        document.getElementById('switch-log').style.display = '';
      }
    }

    function execLogin() { const u=document.getElementById('auth-usr').value.trim(), p=document.getElementById('auth-pwd').value.trim(); if(u&&p){authSessionToken=p;socket.emit('login',{username:u,password:p});} }
    function execRegister() { const u=document.getElementById('auth-usr').value.trim(), e=document.getElementById('auth-email').value.trim(), p=document.getElementById('auth-pwd').value.trim(); if(u&&e&&p){socket.emit('register',{username:u,email:e,password:p});}else toast('請填寫完整資訊','error'); }
    
    // 忘記密碼流程
    function requestCode() {
      const u=document.getElementById('auth-usr').value.trim(), e=document.getElementById('auth-email').value.trim();
      if(!u || !e) return toast('請輸入使用者名稱與信箱', 'error');
      socket.emit('request password reset', { username: u, email: e });
    }
    
    socket.on('reset code received', code => {
      // 模擬收到驗證碼後，切換 UI 讓使用者輸入新密碼
      document.getElementById('btn-get-code').style.display = 'none';
      document.getElementById('btn-reset-pwd').style.display = 'block';
      document.getElementById('code-group').style.display = '';
      document.getElementById('auth-email').closest('.auth-input-group').style.display = 'none';
      document.getElementById('auth-pwd').value = ''; // 清空準備輸入新密碼
      document.getElementById('auth-pwd').placeholder = '請輸入全新金鑰';
    });

    function execResetPwd() {
      const u=document.getElementById('auth-usr').value.trim(), c=document.getElementById('auth-code').value.trim(), p=document.getElementById('auth-pwd').value.trim();
      if(u&&c&&p) socket.emit('execute password reset', { username: u, code: c, newPassword: p });
    }

    socket.on('auth error', m => toast(m, 'error'));
    socket.on('auth success', m => { toast(m, 'success'); switchAuthMode('login'); });
    socket.on('system message', m => toast(m, 'info'));

    socket.on('login success', data => {
      currUser = data.username;
      document.getElementById('auth-screen').style.opacity = 0; setTimeout(()=>document.getElementById('auth-screen').style.display='none',500);
      document.getElementById('my-name').innerText = sanitize(currUser);
      updateAvatarUI(document.getElementById('my-avatar'), currUser, data.avatar);

    function showCallUI(name, status, isCallingOut) {
      callWidget.style.display = 'flex'; callName.innerText = sanitize(name); callAvatar.innerText = sanitize(name)[0].toUpperCase(); callAvatar.style.background = genColor(name);
      callStatus.innerHTML = `<i class="fa-solid fa-satellite-dish"></i> ${status}`;
      if(status==='正在呼叫...' || status==='即將接通...') { callStatus.className='call-status ringing'; btnAcceptCall.style.display='none'; }
      else if(status==='收到來電') { callStatus.className='call-status ringing'; btnAcceptCall.style.display='flex'; }
      else { callStatus.className='call-status'; callStatus.innerHTML=`<i class="fa-solid fa-microphone"></i> 通話進行中`; btnAcceptCall.style.display='none'; }
    }

    function cleanupCall() {
      if(peerConnection){peerConnection.close();peerConnection=null;} if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
      callWidget.style.display='none'; currentCallTarget=null; isCallActive=false; btnAcceptCall.style.display='none';
    }

    window.acceptCall = () => { btnAcceptCall.style.display='none'; callStatus.innerText='正在連接...'; socket.emit('call response', { caller: currentCallTarget, callee: currUser, accepted: true }); initWebRTC(currentCallTarget, false); };
    window.endCall = () => {
      if(currentCallTarget) socket.emit('end call', { sender: currUser, target: currentCallTarget });
      if(callStatus.innerText==='收到來電') socket.emit('call response', { caller: currentCallTarget, callee: currUser, accepted: false });
      cleanupCall();
    };

    async function initWebRTC(targetUser, isCaller) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.onicecandidate = e => { if(e.candidate) socket.emit('webrtc signal', { sender: currUser, target: targetUser, signal: { type: 'candidate', candidate: e.candidate }}); };
        peerConnection.ontrack = e => { remoteAudio.srcObject = e.streams[0]; showCallUI(targetUser, '通話中', false); isCallActive = true; };
        if(isCaller) { const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); socket.emit('webrtc signal', { sender: currUser, target: targetUser, signal: { type: 'offer', sdp: peerConnection.localDescription }}); }
      } catch(e) { toast('麥克風權限遭拒', 'error'); endCall(); }
    }

    socket.on('incoming call', ({ caller }) => {
      if(isCallActive) return socket.emit('call response', { caller, callee: currUser, accepted: false });
      currentCallTarget = caller; showCallUI(caller, '收到來電', false);
    });
    socket.on('call response', ({ callee, accepted }) => {
      if(accepted) { showCallUI(callee, '即將接通...', true); initWebRTC(callee, true); }
      else { toast(`${sanitize(callee)} 拒絕了來電`, 'error'); cleanupCall(); }
    });
    socket.on('webrtc signal', async ({ sender, signal }) => {
      if(sender !== currentCallTarget || !peerConnection) return;
      try {
        if(signal.type==='offer') { await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp)); const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans); socket.emit('webrtc signal', { sender: currUser, target: sender, signal: { type: 'answer', sdp: peerConnection.localDescription }}); }
        else if(signal.type==='answer') { await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp)); }
        else if(signal.type==='candidate') { await peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate)); }
      } catch(e) {}
    });
    socket.on('call ended', ({ sender }) => { if(sender === currentCallTarget) { toast('通話結束'); cleanupCall(); } });

    mBtnSync.onclick = async () => { const u = ghUserInp.value.trim(); const r = ghRepoInp.value.trim(); if(!u || !r) return; try { mAudio.pause(); mTitle.innerText = '同步中...'; mPlaylists = {}; const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/`); const items = await res.json(); mPlaylists['Root'] = filterAudio(items); const dirs = items.filter(i => i.type === 'dir'); for(let d of dirs) { const sub = await (await fetch(d.url)).json(); const tracks = filterAudio(sub); if(tracks.length>0) mPlaylists[d.name] = tracks; } localStorage.setItem('jrmusic_gh_user', u); localStorage.setItem('jrmusic_gh_repo', r); mTitle.innerText = '就緒'; renderMNav(); mCurList = 'Root'; mFiltered = [...mPlaylists['Root']]; renderMList(); } catch(e) { mTitle.innerText = '同步失敗'; } };
    if(ghUserInp.value) mBtnSync.click();
    const mLoad = (idx, autoPlay) => { if(mFiltered.length === 0) return; mCurIdx = idx; const song = mFiltered[idx]; mAudio.src = song.u; mAudio.load(); mTitle.innerText = song.t; mCover.style.backgroundImage = 'none'; mEmoji.style.opacity = '1'; mParsedLyrics = []; mCurLyricIdx = -1; lyricBox.innerHTML = '<div style="color:gray;font-size:12px;">解析中...</div>'; if(mCoverURL) { URL.revokeObjectURL(mCoverURL); mCoverURL = null; } if(autoPlay) mAudio.play().catch(()=>{}); fetch(song.u).then(r=>{if(r.ok)return r.blob();throw ''}).then(blob=>{ if(!window.jsmediatags) return; window.jsmediatags.read(blob, { onSuccess: tag => { const pic = tag.tags.picture; if(pic) { const bl = new Blob([new Uint8Array(pic.data)], {type: pic.format}); mCoverURL = URL.createObjectURL(bl); mCover.style.backgroundImage = `url(${mCoverURL})`; mEmoji.style.opacity = '0'; } const ex = o => { if(!o)return ""; if(typeof o==='string')return o; if(o.text)return o.text; return ""; }; let raw = ex(tag.tags.lyrics) || ex(tag.tags.USLT); if(raw){ mIsSynced=false; lyricStatus.innerText='純文字'; lyricBox.innerHTML = `<div style="color:gray;font-size:11px;white-space:pre-wrap;">${raw}</div>`; } else { lyricBox.innerHTML = '<div style="color:gray;font-size:12px;">純音樂</div>'; } }, onError: () => {} }); }).catch(()=>{}); renderMList(); };
    mPlayBtn.onclick = () => mAudio.paused ? mAudio.play() : mAudio.pause(); mNextBtn.onclick = () => mLoad((mCurIdx + 1) % mFiltered.length, true); mPrevBtn.onclick = () => mLoad((mCurIdx - 1 + mFiltered.length) % mFiltered.length, true);
    mAudio.onplay = () => { mVinylWrap.style.animation = 'm-spin 6s linear infinite'; mPlayIcon.className = 'fa-solid fa-pause'; }; mAudio.onpause = () => { mVinylWrap.style.animation = 'none'; mPlayIcon.className = 'fa-solid fa-play'; };
    mAudio.ontimeupdate = () => { let s = mAudio.currentTime; if(!isNaN(s)) mTime.innerText = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`; };
  </script>
