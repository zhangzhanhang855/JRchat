<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JR Chat - Premium</title>
  <style>
    /* 全局重置与基础变量 */
    :root {
      --primary-color: #6c5ce7;
      --primary-hover: #5b4bc4;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-muted: #a0a0b5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* 侧边栏：类似音乐软件的歌单列表 */
    #sidebar {
      width: 280px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    .brand {
      padding: 30px 20px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      background: -webkit-linear-gradient(#fff, #a0a0b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; }

    .channel-title {
      padding: 0 20px 10px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #room-list { list-style: none; overflow-y: auto; flex: 1; }
    
    .room-item {
      padding: 15px 20px;
      margin: 5px 15px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .room-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
    
    .room-item.active {
      background: var(--primary-color);
      color: #fff;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    /* 主聊天区域 */
    #main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部导航栏 */
    #chat-header {
      padding: 20px 30px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    .menu-toggle { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

    /* 消息列表区 */
    #messages {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message-wrapper { display: flex; gap: 15px; max-width: 80%; }
    .message-wrapper.self { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .msg-content { display: flex; flex-direction: column; gap: 5px; }
    .message-wrapper.self .msg-content { align-items: flex-end; }

    .sender-name { font-size: 12px; color: var(--text-muted); margin: 0 5px; }

    .bubble {
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      word-wrap: break-word;
    }

    .message-wrapper.self .bubble {
      background: var(--primary-color);
      border-color: var(--primary-color);
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
    }

    /* 类似播放器底部的输入悬浮舱 */
    #input-container {
      padding: 20px 30px;
      background: linear-gradient(to top, rgba(15, 12, 41, 0.9), transparent);
    }

    #form {
      display: flex;
      gap: 15px;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 20px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    #input::placeholder { color: var(--text-muted); }

    button[type="submit"] {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 0 25px;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: var(--primary-hover); }

    /* --- 手机端响应式布局 --- */
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      
      #sidebar {
        position: absolute;
        height: 100%;
        transform: translateX(-100%); /* 默认隐藏在左侧屏幕外 */
        box-shadow: 5px 0 25px rgba(0,0,0,0.5);
      }
      
      #sidebar.active { transform: translateX(0); } /* 呼出侧边栏 */
      
      .close-btn { display: block; }

      #chat-header { padding: 15px 20px; }
      #messages { padding: 20px 15px; }
      .message-wrapper { max-width: 95%; }
      #input-container { padding: 15px; }
    }
  </style>
</head>
<body>

  <!-- 左侧：音乐播放器式的“歌单”列表 -->
  <aside id="sidebar">
    <div class="brand">
      JR Chat <span class="close-btn" onclick="toggleMenu()">×</span>
    </div>
    <div class="channel-title">Channels</div>
    <ul id="room-list">
      <li class="room-item active" onclick="switchRoom('General')"># General</li>
      <li class="room-item" onclick="switchRoom('Music')"># Music</li>
      <li class="room-item" onclick="switchRoom('Gaming')"># Gaming</li>
      <li class="room-item" onclick="switchRoom('Tech')"># Tech</li>
    </ul>
  </aside>

  <!-- 右侧：主聊天区 -->
  <main id="main-chat">
    <header id="chat-header">
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
      <h3 id="current-room-name"># General</h3>
    </header>

    <div id="messages"></div>

    <div id="input-container">
      <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = 'General';
    let username = localStorage.getItem('username');
    
    // 生成头像颜色
    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
      return `hsl(${hash % 360}, 70%, 60%)`;
    }

    if (!username) {
      username = prompt('Please enter your name for JR Chat:') || 'Guest_' + Math.floor(Math.random() * 1000);
      localStorage.setItem('username', username);
    }

    // 初始加入房间
    socket.emit('join room', currentRoom);

    // 手机端菜单切换逻辑
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
    }

    // 切换房间逻辑
    window.switchRoom = function(room) {
      currentRoom = room;
      document.getElementById('current-room-name').textContent = '# ' + room;
      document.getElementById('messages').innerHTML = ''; // 清空屏幕
      socket.emit('join room', room);
      
      // 更新高亮状态
      document.querySelectorAll('.room-item').forEach(el => {
        el.classList.remove('active');
        if(el.textContent.includes(room)) el.classList.add('active');
      });

      // 手机端点击后自动收起侧边栏
      if(window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('active');
      }
    };

    // 发送消息
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value) {
        socket.emit('chat message', {
          room: currentRoom,
          sender: username,
          text: input.value
        });
        input.value = '';
      }
    });

    // 接收历史记录
    socket.on('chat history', (history) => {
      document.getElementById('messages').innerHTML = '';
      history.forEach(msg => appendMessage(msg));
    });

    // 接收新消息
    socket.on('chat message', (msg) => {
      appendMessage(msg);
    });

    // 将消息渲染到屏幕
    function appendMessage(msg) {
      const messagesDiv = document.getElementById('messages');
      const isSelf = msg.sender === username;
      
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${isSelf ? 'self' : ''}`;
      
      const initial = msg.sender.charAt(0).toUpperCase();
      const color = getAvatarColor(msg.sender);

      wrapper.innerHTML = `
        <div class="avatar" style="background: ${color}; color: white;">${initial}</div>
        <div class="msg-content">
          ${!isSelf ? `<span class="sender-name">${msg.sender}</span>` : ''}
          <div class="bubble">${msg.text}</div>
        </div>
      `;
      
      messagesDiv.appendChild(wrapper);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
